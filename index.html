<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>牌局记录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Spectral:ital@1&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F1411;
    --card: #1B2420;
    --card-raised: #212C26;
    --line: #2C3830;
    --ink: #E8E4D8;
    --ink-dim: #9CAA9F;
    --ink-faint: #5A7A6A;
    --gold: #C9A24B;
    --gold-bright: #E0BC6A;
    --loss: #B5524A;
    --loss-bright: #C96A60;
    --suit-red: #C2645C;
    --venetian: #8B6BB0;
    --mgm: #C9A24B;
    --radius: 16px;
    --radius-sm: 10px;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; overscroll-behavior-x: none; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    overscroll-behavior-y: contain;
    touch-action: manipulation;
  }

  body{
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,162,75,0.07), transparent),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }

  .serif{ font-family: 'Spectral', serif; }

  /* ---------- App shell ---------- */
  #app{
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    padding-bottom: 100px;
  }

  header.top{
    padding: 28px 20px 18px;
    position: relative;
    padding-right: 150px; /* room for io-bar */
  }
  header.top::after{
    content:"";
    position:absolute; left:20px; right:20px; bottom:0;
    height:1px;
    background: linear-gradient(90deg, transparent, var(--line) 15%, var(--line) 85%, transparent);
  }
  .eyebrow{
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  h1.title{
    font-family: 'Spectral', serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  h1.title em{
    font-style: italic;
    color: var(--gold);
    font-weight: 500;
  }

  .summary-row{
    display:flex; gap: 10px;
    margin-top: 18px;
    overflow-x: auto;
    flex-wrap: nowrap;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .summary-row::-webkit-scrollbar{ display:none; }
  .summary-chip{
    flex:1;
    flex-shrink: 0;
    min-width: 78px;
    max-width: 120px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .summary-chip .label{
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .summary-chip .val{
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .val.pos{ color: var(--gold-bright); }
  .val.neg{ color: var(--loss-bright); }

  /* ---------- Timeline list ---------- */
  #list{
    padding: 22px 16px 10px;
    display:flex;
    flex-direction: column-reverse; /* oldest visually first via column-reverse + DOM order */
    gap: 10px;
    -webkit-overflow-scrolling: touch;
  }

  .day-group{
    display:flex;
    flex-direction: column;
    gap: 8px;
  }
  .day-label{
    font-family:'Spectral', serif;
    font-size: 13px;
    color: var(--ink-faint);
    padding: 6px 4px 2px;
    letter-spacing: 0.02em;
  }

  .entry{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    display:flex;
    align-items:center;
    gap: 14px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease;
  }
  .entry:active{ transform: scale(0.98); }
  .entry::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0;
    width: 3px;
  }
  .entry.venue-venetian::before{ background: var(--venetian); }
  .entry.venue-mgm::before{ background: var(--mgm); }

  .entry .ring{
    flex-shrink:0;
    width: 50px; height:50px;
    position: relative;
    display:flex; align-items:center; justify-content:center;
  }
  .entry .ring svg{ width:50px; height:50px; transform: rotate(-90deg); }
  .entry .ring .track{ fill:none; stroke: var(--line); stroke-width:4; }
  .entry .ring .prog{ fill:none; stroke-width:4; stroke-linecap: round; }
  .entry .ring .score-text{
    position:absolute;
    font-size: 13px;
    font-weight:600;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }

  .entry .mid{
    flex:1;
    min-width:0;
  }
  .entry .date-line{
    font-family:'Spectral', serif;
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
  }
  .entry .meta-line{
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 3px;
    letter-spacing: 0.03em;
  }
  .entry .meta-line .dot{ margin: 0 5px; opacity:.5; }

  .entry .amount{
    flex-shrink:0;
    text-align:right;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .entry .amount .unit{
    font-size: 11px;
    font-weight: 400;
    color: var(--ink-faint);
    margin-right: 2px;
  }

  /* ---------- Empty state ---------- */
  #empty{
    padding: 70px 30px 30px;
    text-align:center;
    color: var(--ink-faint);
    display:none;
  }
  #empty .glyph{
    font-size: 34px;
    margin-bottom: 14px;
    opacity: .55;
  }
  #empty .et{
    font-family:'Spectral', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  #empty .es{
    font-size: 12.5px;
    line-height:1.6;
  }

  /* ---------- FAB ---------- */
  #fab{
    position: fixed;
    right: max(20px, calc((100vw - 560px)/2 + 20px));
    bottom: 26px;
    width: 58px; height:58px;
    border-radius: 50%;
    background: linear-gradient(155deg, var(--gold-bright), var(--gold) 65%);
    border: none;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 24px rgba(201,162,75,0.35), 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer;
    z-index: 50;
    transition: transform .15s ease;
  }
  #fab:active{ transform: scale(0.92); }
  #fab svg{ width:26px; height:26px; }

  /* ---------- Sheet (bottom drawer) ---------- */
  .sheet-overlay{
    position: fixed; inset:0;
    background: rgba(7,10,8,0.6);
    backdrop-filter: blur(2px);
    z-index: 100;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease;
  }
  .sheet-overlay.open{ opacity:1; pointer-events:auto; }

  .sheet{
    position: fixed;
    left:0; right:0; bottom:0;
    max-width: 560px;
    margin: 0 auto;
    max-height: 92vh;
    background: var(--bg);
    border-radius: 22px 22px 0 0;
    border-top: 1px solid var(--line);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    z-index: 101;
    transform: translateY(100%);
    transition: transform .32s cubic-bezier(.32,.72,0,1);
    display:flex;
    flex-direction: column;
  }
  .sheet.open{ transform: translateY(0); }

  .sheet-handle{
    width: 36px; height:4px;
    background: var(--line);
    border-radius:2px;
    margin: 12px auto 4px;
    flex-shrink:0;
  }

  .sheet-head{
    padding: 10px 20px 14px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    flex-shrink:0;
  }
  .sheet-head h2{
    font-family:'Spectral', serif;
    font-size: 19px;
    font-weight: 600;
    margin:0;
  }
  .sheet-close{
    width:30px; height:30px;
    border-radius:50%;
    background: var(--card);
    border:1px solid var(--line);
    color: var(--ink-dim);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size: 15px;
  }

  .sheet-body{
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 4px 20px 24px;
    flex:1;
  }

  .field{
    margin-bottom: 22px;
    position: relative;
  }
  .field-label{
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 9px;
    display:flex;
    align-items:center;
    justify-content: space-between;
  }

  /* Date control */
  .date-control{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    cursor:pointer;
  }
  .date-control .dtext{
    font-family:'Spectral', serif;
    font-size: 16px;
    color: var(--ink);
  }
  .date-control .dicon{ color: var(--ink-faint); font-size:16px; }

  input[type="date"].native-date{
    position:absolute;
    opacity:0;
    pointer-events:none;
    width:1px; height:1px;
  }

  /* Session control */
  .session-row{
    display:flex;
    align-items:center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 8px 8px;
  }
  .stepper-btn{
    width: 38px; height:38px;
    border-radius: 9px;
    background: var(--card-raised);
    border: 1px solid var(--line);
    color: var(--ink);
    font-size: 18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    user-select:none;
  }
  .stepper-btn:active{ background: var(--line); }
  .session-val{
    flex:1;
    text-align:center;
    font-size: 18px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .session-hint{
    font-size: 10.5px;
    color: var(--ink-faint);
    margin-top: 7px;
    line-height:1.5;
  }

  /* Pill toggle group */
  .pill-group{
    display:flex;
    gap: 9px;
  }
  .pill{
    flex:1;
    padding: 12px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-dim);
    text-align:center;
    font-family: 'Spectral', serif;
    font-size: 14.5px;
    font-weight: 500;
    cursor:pointer;
    position:relative;
    transition: border-color .15s ease, color .15s ease, background .15s ease;
  }
  .pill .check{
    position:absolute; top:7px; right:9px;
    width:14px; height:14px;
    opacity:0;
    transition: opacity .15s ease;
  }
  .pill.selected .check{ opacity:1; }
  .pill[data-venue="venetian"].selected{
    border-color: var(--venetian);
    color: var(--ink);
    background: rgba(139,107,176,0.12);
  }
  .pill[data-venue="venetian"].selected .check{ color: var(--venetian); }
  .pill[data-venue="mgm"].selected{
    border-color: var(--mgm);
    color: var(--ink);
    background: rgba(201,162,75,0.1);
  }
  .pill[data-venue="mgm"].selected .check{ color: var(--mgm); }
  .pill[data-level].selected{
    border-color: var(--gold);
    color: var(--ink);
    background: rgba(201,162,75,0.1);
  }
  .pill[data-level].selected .check{ color: var(--gold); }
  .pill.small{ font-family:'IBM Plex Mono', monospace; font-size:14px; font-weight:600; }

  /* Sliders */
  .slider-block{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 6px 16px 4px;
  }
  .slider-item{
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .slider-item:last-child{ border-bottom:none; }
  .slider-item .si-top{
    display:flex;
    justify-content: space-between;
    align-items:baseline;
    margin-bottom: 10px;
  }
  .slider-item .si-name{
    font-family:'Spectral', serif;
    font-size: 14.5px;
    color: var(--ink);
  }
  .slider-item .si-val{
    font-size: 14px;
    font-weight:600;
    color: var(--gold-bright);
    font-variant-numeric: tabular-nums;
    min-width: 34px;
    text-align:right;
  }

  .rng{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height: 4px;
    background: var(--line);
    border-radius:2px;
    outline:none;
    margin:0;
    position:relative;
  }
  .rng::-webkit-slider-runnable-track{
    height:4px;
    background: var(--line);
    border-radius:2px;
  }
  .rng::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px; height:18px;
    margin-top:-7px;
    background: var(--gold-bright);
    border-radius: 4px;
    transform: rotate(45deg);
    border: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    cursor:pointer;
  }
  .rng::-moz-range-track{
    height:4px;
    background: var(--line);
    border-radius:2px;
  }
  .rng::-moz-range-thumb{
    width:14px; height:14px;
    background: var(--gold-bright);
    border-radius:4px;
    transform: rotate(45deg);
    border:none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    cursor:pointer;
  }

  .total-card{
    margin-top: 16px;
    background: linear-gradient(135deg, rgba(201,162,75,0.14), rgba(201,162,75,0.04));
    border: 1px solid rgba(201,162,75,0.35);
    border-radius: var(--radius);
    padding: 16px 18px;
    display:flex;
    align-items:center;
    justify-content: space-between;
  }
  .total-card .tt-label{
    font-family:'Spectral', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-dim);
  }
  .total-card .tt-val{
    font-size: 24px;
    font-weight:700;
    color: var(--gold-bright);
    font-variant-numeric: tabular-nums;
  }
  .total-card .tt-val .tt-max{
    font-size: 14px;
    color: var(--ink-faint);
    font-weight:500;
  }

  /* Amount field */
  .amount-row{
    display:flex;
    gap: 10px;
  }
  .sign-toggle{
    display:flex;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    overflow:hidden;
    flex-shrink:0;
  }
  .sign-btn{
    width: 46px; height: 100%;
    min-height: 50px;
    display:flex; align-items:center; justify-content:center;
    background: var(--card);
    color: var(--ink-faint);
    font-size: 19px;
    font-weight:600;
    cursor:pointer;
    border:none;
  }
  .sign-btn + .sign-btn{ border-left: 1px solid var(--line); }
  .sign-btn.active.plus{ background: rgba(201,162,75,0.18); color: var(--gold-bright); }
  .sign-btn.active.minus{ background: rgba(181,82,74,0.18); color: var(--loss-bright); }

  .amount-input-wrap{
    flex:1;
    display:flex;
    align-items:center;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 0 14px;
  }
  .hkd-sym{
    font-family:'Spectral', serif;
    font-weight:600;
    font-size: 16px;
    color: var(--ink-faint);
    margin-right: 8px;
  }
  .amount-input-wrap input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color: var(--ink);
    font-family:'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight:600;
    padding: 13px 0;
    min-width:0;
    font-variant-numeric: tabular-nums;
  }
  .amount-input-wrap input::placeholder{ color: var(--ink-faint); font-weight:400; }
  /* hide number spinners */
  .amount-input-wrap input::-webkit-outer-spin-button,
  .amount-input-wrap input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .amount-input-wrap input[type=number]{ -moz-appearance: textfield; }

  /* Save button */
  .sheet-footer{
    padding: 6px 20px 28px;
    flex-shrink:0;
  }
  .save-btn{
    width:100%;
    padding: 16px;
    border-radius: var(--radius);
    border:none;
    background: linear-gradient(155deg, var(--gold-bright), var(--gold) 70%);
    color: #1A1408;
    font-family:'Spectral', serif;
    font-weight:600;
    font-size: 16.5px;
    letter-spacing: 0.02em;
    cursor:pointer;
    box-shadow: 0 6px 18px rgba(201,162,75,0.25);
  }
  .save-btn:active{ transform: scale(0.99); }

  .delete-btn{
    width:100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(181,82,74,0.4);
    background: rgba(181,82,74,0.08);
    color: var(--loss-bright);
    font-family:'IBM Plex Mono', monospace;
    font-size: 13.5px;
    font-weight:600;
    cursor:pointer;
    margin-top: 10px;
  }

  /* ---------- Key hands (关键牌局) ---------- */
  .hands-drag-zone{
    position: relative;
    height: 0;
    transition: height .2s ease;
  }
  .hand-card{
    position: absolute;
    left:0; right:0; top:0;
    height: 50px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    display:flex;
    align-items:center;
    gap: 4px;
    padding: 0 6px 0 2px;
    cursor: pointer;
    touch-action: pan-y;
  }
  .hand-card.dragging{
    box-shadow: 0 10px 26px rgba(0,0,0,0.45);
    border-color: var(--gold);
    background: var(--card-raised);
    transform: scale(1.015);
  }
  .hand-handle{
    flex-shrink:0;
    width: 34px;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--ink-faint);
    font-size: 15px;
    letter-spacing: -1px;
    cursor: grab;
    touch-action: none;
    user-select: none;
  }
  .hand-handle:active{ cursor: grabbing; color: var(--ink-dim); }
  .hand-preview{
    flex:1;
    min-width:0;
    font-family:'Spectral', serif;
    font-size: 13.5px;
    color: var(--ink-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hand-index{
    flex-shrink:0;
    font-size: 10px;
    color: var(--ink-faint);
    font-family:'IBM Plex Mono', monospace;
    width: 16px;
    text-align:center;
  }
  .hand-arrow{
    flex-shrink:0;
    color: var(--ink-faint);
    font-size: 16px;
    padding-right: 4px;
  }

  .hand-add{
    margin-top: 8px;
    height: 46px;
    border-radius: var(--radius-sm);
    border: 1px dashed var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 7px;
    color: var(--ink-faint);
    font-family:'Spectral', serif;
    font-size: 13.5px;
    cursor:pointer;
  }
  .hand-add:active{ background: var(--card); }
  .hand-add .plus-icon{
    font-size: 16px;
    line-height:1;
    color: var(--gold);
  }
  .hand-add.disabled{
    display:none;
  }

  /* ---------- Full-screen hand editor ---------- */
  .hand-editor{
    position: fixed;
    inset: 0;
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg);
    z-index: 200;
    display:flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
    overflow: hidden;
  }
  .hand-editor.open{ transform: translateY(0); }
  @media (min-width: 561px){
    .hand-editor:not(.open){ transform: translateY(100%) translateX(calc(50vw + 280px)); }
    .hand-editor.open{ transform: translateY(0) translateX(0); }
  }

  .he-topbar{
    position: relative;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 16px 16px 14px;
    border-bottom: 1px solid var(--line);
  }
  .he-title{
    position:absolute;
    left:50%; top:50%;
    transform: translate(-50%,-50%);
    font-family:'Spectral', serif;
    font-size: 14.5px;
    color: var(--ink-faint);
    pointer-events:none;
  }
  .he-delete, .he-save{
    border:none;
    background:none;
    font-family:'IBM Plex Mono', monospace;
    font-size: 14.5px;
    font-weight:600;
    cursor:pointer;
    padding: 7px 4px;
    z-index:1;
  }
  .he-delete{ color: var(--loss-bright); }
  .he-save{ color: var(--gold-bright); }

  .he-suits{
    flex-shrink:0;
    display:flex;
    gap: 9px;
    padding: 16px 16px 4px;
  }
  .suit-btn{
    flex:1;
    aspect-ratio: 1.5;

  .cal-head .cal-nav{

  ::selection{ background: var(--gold); color:#1A1408; }

  /* ---------- Import / Export ---------- */
  .io-bar{
    position: absolute;
    top: 28px;
    right: 20px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .io-btn{
    display: flex;

  /* Toast */
  #io-toast{
    position: fixed;
    bottom: 100px;
    left: 50%;

    border: 1px solid var(--line);

    padding: 10px 18px;

    transform: translateX(-50%) translateY(0);

  #io-toast.ok{ border-color: var(--gold); color: var(--gold-bright); }
  #io-toast.err{ border-color: var(--loss); color: var(--loss-bright); }

  /* ---------- Clickable summary chips ---------- */

    cursor: pointer;
    transition: border-color .15s ease, background .15s ease;
  }
  .summary-chip-btn:hover{ border-color: var(--gold); background: rgba(201,162,75,0.08); }
  .summary-chip-btn:active{ transform: scale(0.97); }
  .chip-arrow{ font-size:20px; color:var(--gold); line-height:1; }

  /* ---------- Full-screen modal panels ---------- */
  .modal-overlay{
    position: fixed; inset:0;
    background: rgba(7,10,8,0.65);
    backdrop-filter: blur(3px);
    z-index: 120;
    opacity:0; pointer-events:none;
    transition: opacity .25s ease;
  }
  .modal-overlay.open{ opacity:1; pointer-events:auto; }

  .modal-panel{
    position: fixed;
    top:0; left:0; right:0; bottom:0;
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg);
    z-index: 121;
    transform: translateX(100%);
    transition: transform .32s cubic-bezier(.32,.72,0,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-panel.open{ transform: translateX(0); }
  /* On wide screens, ensure panel is fully hidden off-screen */
  @media (min-width: 561px){
    .modal-panel{ transform: translateX(calc(50vw + 280px)); }
    .modal-panel.open{ transform: translateX(0); }

  .modal-topbar{

    padding: 18px 20px 14px;
    gap: 14px;
    border-bottom: 1px solid var(--line);

  .modal-back{
    width:34px; height:34px;

  /* ---------- Analysis panel tab bar ---------- */

    color: var(--ink-faint);

</style>
</head>
<body>

<div id="app">
  <header class="top">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>

<!-- ===== Analysis Modal ===== -->

<script>
(function(){
  "use strict";

  // ---------- Constants ----------
  var STORAGE_KEY = "poker_log_entries_v1";
  var CRITERIA = [
    { key:"observe", name:"观察细致程度" },
    { key:"aggro",   name:"进攻合理程度" },
    { key:"discip",  name:"弃牌纪律程度" },
    { key:"emotion", name:"情绪稳定程度" },
    { key:"review",  name:"复盘清晰程度" }
  ];
  var VENUE_LABEL = { venetian:"威尼斯人", mgm:"MGM" };

  // ---------- State ----------
  var entries = loadEntries();
  var editingId = null;       // null = creating new
  var draft = null;           // current form state
  var calViewYear, calViewMonth; // calendar nav state (0-indexed month)

  // ---------- Persistence ----------
  function loadEntries(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return [];
      var arr = JSON.parse(raw);
      if(!Array.isArray(arr)) return [];
      return arr;
    }catch(e){ return []; }
  }
  function saveEntries(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
    catch(e){ console.error("save failed", e); }
  }

  // ---------- Date helpers ----------
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function toISO(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function todayISO(){ return toISO(new Date()); }
  function parseISO(iso){
    var p = iso.split("-");
    return new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
  }
  function formatCN(iso){
    var d = parseISO(iso);
    return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
  }
  var WEEKDAY_CN = ["周日","周一","周二","周三","周四","周五","周六"];

  // ---------- Derived ----------
  function sessionsOnDate(iso, excludeId){
    return entries.filter(function(e){ return e.date===iso && e.id!==excludeId; });
  }
  function nextSessionFor(iso, excludeId){
    var existing = sessionsOnDate(iso, excludeId).map(function(e){ return e.session; });
    var n = 1;
    while(existing.indexOf(n) !== -1) n++;
    return n;
  }
  function computeTotal(scores){
    var sum = 0;
    CRITERIA.forEach(function(c){ sum += scores[c.key]; });
    return Math.round(sum*10)/10;
  }

  // ---------- Default draft ----------
  function freshDraft(){
    var iso = todayISO();
    var scores = {};
    CRITERIA.forEach(function(c){ scores[c.key] = 1.0; });
    return {
      id: null,
      date: iso,
      session: nextSessionFor(iso, null),
      venue: null,
      level: null,
      scores: scores,
      sign: "+",
      amount: "",
      hands: []
    };
  }

  // ---------- Rendering: list ----------
  var listEl = document.getElementById("list");
  var emptyEl = document.getElementById("empty");

  function render(){
    renderStats();
    renderList();
  }

  function renderStats(){
    var count = entries.length;
    document.getElementById("statCount").textContent = count;
    var totalAmt = 0, totalScore = 0;
    entries.forEach(function(e){
      totalAmt += (e.sign==="-" ? -1 : 1) * e.amount;
      totalScore += computeTotal(e.scores);
    });
    var totalEl = document.getElementById("statTotal");
    totalEl.textContent = (totalAmt>=0?"+":"−")+"HK$"+formatMoney(Math.abs(totalAmt));
    totalEl.className = "val " + (totalAmt>0?"pos":(totalAmt<0?"neg":""));
    var avgEl = document.getElementById("statAvg");
    avgEl.textContent = count ? (totalScore/count).toFixed(1) : "—";

  function formatMoney(n){
    n = Math.round(n*100)/100;
    var parts = n.toString().split(".");
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    return parts.join(".");
  }

  function renderList(){
    // sort ascending by date then session, so DOM order is oldest->newest;
    // combined with column-reverse the newest renders at the bottom visually,
    // and the page naturally opens scrolled to the latest entry at the bottom.
    var sorted = entries.slice().sort(function(a,b){
      if(a.date !== b.date) return a.date < b.date ? -1 : 1;
      return a.session - b.session;
    });

    listEl.innerHTML = "";
    emptyEl.style.display = sorted.length ? "none" : "block";

    // group by date for day labels
    var groups = [];
    var lastDate = null;
    sorted.forEach(function(e){
      if(e.date !== lastDate){
        groups.push({ date:e.date, items:[] });
        lastDate = e.date;
      }
      groups[groups.length-1].items.push(e);
    });

    // since #list is column-reverse, append groups in normal order
    // (first group = earliest date) and the browser will flip visual order.
    groups.forEach(function(g){
      var groupEl = document.createElement("div");
      groupEl.className = "day-group";

      var label = document.createElement("div");
      label.className = "day-label";
      label.textContent = formatCN(g.date) + (g.items.length>1 ? "（"+g.items.length+"局）" : "");

      '<div class="ring">'+
        '<svg viewBox="0 0 50 50">'+
          '<circle class="track" cx="25" cy="25" r="'+r+'"/>'+
          '<circle class="prog" cx="25" cy="25" r="'+r+'" stroke="'+color+'" '+
            'stroke-dasharray="'+dash.toFixed(1)+' '+circ.toFixed(1)+'"/>'+
        '</svg>'+
        '<div class="score-text">'+total.toFixed(1)+'</div>'+
      '</div>'+
      '<div class="mid">'+
        '<div class="date-line">'+formatCN(e.date)+'</div>'+

      '</div>'+
      '<div class="amount" style="color:'+(isPos?'var(--gold-bright)':'var(--loss-bright)')+'">'+
        '<span class="unit">HK$</span>'+(isPos?'+':'−')+formatMoney(amt)+
      '</div>';

    card.addEventListener("click", function(){ openSheetForEdit(e.id); });
    return card;
  }

  function renderCalendar(){
    document.getElementById("calYm").textContent = calViewYear+"年"+(calViewMonth+1)+"月";
    var grid = document.getElementById("calGrid");
    grid.innerHTML = "";
    WEEKDAY_CN.forEach(function(w){
      var el = document.createElement("div");
      el.className = "cal-dow";
      el.textContent = w.replace("周","");
      grid.appendChild(el);
    });

    var firstOfMonth = new Date(calViewYear, calViewMonth, 1);
    var startWeekday = firstOfMonth.getDay();
    var daysInMonth = new Date(calViewYear, calViewMonth+1, 0).getDate();
    var daysInPrevMonth = new Date(calViewYear, calViewMonth, 0).getDate();
    var todayIso = todayISO();

    var totalCells = Math.ceil((startWeekday+daysInMonth)/7)*7;

    for(var i=0;i<totalCells;i++){
      var cell = document.createElement("div");
      cell.className = "cal-day";
      var dayNum, cellMonth = calViewMonth, cellYear = calViewYear, muted=false;

      if(i < startWeekday){
        dayNum = daysInPrevMonth - startWeekday + i + 1;
        cellMonth = calViewMonth-1; muted = true;
        if(cellMonth<0){ cellMonth=11; cellYear--; }
      } else if(i >= startWeekday+daysInMonth){
        dayNum = i - (startWeekday+daysInMonth) + 1;
        cellMonth = calViewMonth+1; muted = true;
        if(cellMonth>11){ cellMonth=0; cellYear++; }
      } else {
        dayNum = i - startWeekday + 1;
      }

      var iso = cellYear+"-"+pad(cellMonth+1)+"-"+pad(dayNum);
      cell.textContent = dayNum;
      if(muted) cell.classList.add("muted");
      if(iso === todayIso) cell.classList.add("today");

  var HAND_ITEM_H = 58; // measured on first render, includes 8px gap
  var handEditIndex = null;  // null = creating a new hand, else index into draft.hands
  var dragState = null;

  function escapeHtml(s){
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function handPreviewText(s){
    var oneLine = String(s).replace(/\s+/g, " ").trim();
    return oneLine.length > 46 ? oneLine.slice(0,46) + "…" : oneLine;
  }

  function renderHandsList(){
    handsDragZone.innerHTML = "";
    var n = draft.hands.length;

    draft.hands.forEach(function(text, idx){
      var card = document.createElement("div");
      card.className = "hand-card";
      card.style.top = (idx * HAND_ITEM_H) + "px";
      card.setAttribute("data-idx", idx);
      card.innerHTML =
        '<div class="hand-handle" data-idx="'+idx+'">⠿⠿</div>'+
        '<div class="hand-preview">'+(text ? escapeHtml(handPreviewText(text)) : '<span style="color:var(--ink-faint)">（空）</span>')+'</div>'+
        '<div class="hand-index">'+(idx+1)+'</div>'+
        '<div class="hand-arrow">›</div>';
      card.addEventListener("click", function(ev){
        if(ev.target.closest(".hand-handle")) return;
        openHandEditor(idx);
      });
      handsDragZone.appendChild(card);
    });

    // measure real height from first card once rendered
    requestAnimationFrame(function(){
      var first = handsDragZone.querySelector(".hand-card");
      if(first){
        HAND_ITEM_H = first.offsetHeight + 8;
        Array.prototype.forEach.call(handsDragZone.querySelectorAll(".hand-card"), function(c, slot){
          c.style.top = (slot * HAND_ITEM_H) + "px";
        });
      }
      handsDragZone.style.height = n ? (n * HAND_ITEM_H - 8) + "px" : "0px";
    });

    Array.prototype.forEach.call(handsDragZone.querySelectorAll(".hand-handle"), function(handle){
      handle.addEventListener("pointerdown", onHandleDown);
    });

    handAddBtn.classList.toggle("disabled", n >= 5);
    handsCount.textContent = n + "/5";
  }

  function onHandleDown(e){
    e.preventDefault();
    var handle = e.currentTarget;
    var origIdx = parseInt(handle.getAttribute("data-idx"), 10);
    var cardEls = Array.prototype.slice.call(handsDragZone.querySelectorAll(".hand-card"));
    if(cardEls.length < 2) return; // nothing to reorder

    dragState = {
      startY: e.clientY,
      order: cardEls.map(function(_, i){ return i; }), // identity: fresh render order
      draggedOrigIndex: origIdx,
      cards: cardEls,
      pointerId: e.pointerId,
      handle: handle
    };

    var draggedCard = cardEls[origIdx];
    draggedCard.classList.add("dragging");
    draggedCard.style.transition = "none";
    draggedCard.style.zIndex = "50";

    try{ handle.setPointerCapture(e.pointerId); }catch(err){}
    handle.addEventListener("pointermove", onHandleMove);
    handle.addEventListener("pointerup", onHandleUp);
    handle.addEventListener("pointercancel", onHandleUp);
  }

  function onHandleMove(e){
    if(!dragState) return;
    var deltaY = e.clientY - dragState.startY;
    var draggedCard = dragState.cards[dragState.draggedOrigIndex];
    var originalSlot = dragState.draggedOrigIndex;
    var rawTop = originalSlot * HAND_ITEM_H + deltaY;
    var maxTop = (dragState.order.length - 1) * HAND_ITEM_H;
    rawTop = Math.max(0, Math.min(maxTop, rawTop));
    draggedCard.style.top = rawTop + "px";

    var targetSlot = Math.round(rawTop / HAND_ITEM_H);
    var currentPos = dragState.order.indexOf(dragState.draggedOrigIndex);
    if(targetSlot !== currentPos){
      dragState.order.splice(currentPos, 1);
      dragState.order.splice(targetSlot, 0, dragState.draggedOrigIndex);
      dragState.order.forEach(function(origIdx, slot){
        if(origIdx === dragState.draggedOrigIndex) return;
        var c = dragState.cards[origIdx];
        c.style.transition = "top .18s ease";
        c.style.top = (slot * HAND_ITEM_H) + "px";
      });
    }
  }

  function onHandleUp(e){
    if(!dragState) return;
    var handle = dragState.handle;
    var draggedCard = dragState.cards[dragState.draggedOrigIndex];
    draggedCard.classList.remove("dragging");
    draggedCard.style.zIndex = "";

    handle.removeEventListener("pointermove", onHandleMove);
    handle.removeEventListener("pointerup", onHandleUp);
    handle.removeEventListener("pointercancel", onHandleUp);
    try{ handle.releasePointerCapture(dragState.pointerId); }catch(err){}

    var newHands = dragState.order.map(function(origIdx){ return draft.hands[origIdx]; });
    draft.hands = newHands;
    dragState = null;
    renderHandsList();
  }

  handAddBtn.addEventListener("click", function(){

  // ---------- Import / Export ----------

  // Export: download all entries as a JSON file
  document.getElementById("exportBtn").addEventListener("click", function(){
    if(entries.length === 0){
      showToast("暂无记录可导出", "err");
      return;
    }
    var json = JSON.stringify(entries, null, 2);
    var blob = new Blob([json], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    var date = new Date();
    a.download = "牌局记录_" + date.getFullYear() + pad(date.getMonth()+1) + pad(date.getDate()) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("已导出 " + entries.length + " 条记录 ✓", "ok");
  });

  // Import: read JSON file, deduplicate by id, merge new entries
  document.getElementById("importBtn").addEventListener("click", function(){
    document.getElementById("importFile").value = "";
    document.getElementById("importFile").click();
  });

  document.getElementById("importFile").addEventListener("change", function(e){
    var file = e.target.files && e.target.files[0];
    if(!file) return;

    var reader = new FileReader();
    reader.onload = function(ev){
      try{
        var parsed = JSON.parse(ev.target.result);
        if(!Array.isArray(parsed)){
          showToast("格式错误：文件内容应为数组", "err");
          return;
        }

        // Build a set of existing ids for fast lookup
        var existingIds = {};
        entries.forEach(function(e){ existingIds[e.id] = true; });

        // Also deduplicate by (date + session + venue) as a secondary fingerprint
        // in case records lack stable ids from older exports
        function fingerprint(r){
          return [r.date, r.session, r.venue, r.level, r.sign, r.amount].join("|");
        }
        var existingPrints = {};
        entries.forEach(function(e){ existingPrints[fingerprint(e)] = true; });

        var added = 0;
        var skipped = 0;

        parsed.forEach(function(rec){
          // Basic shape validation
          if(!rec || typeof rec !== "object" || !rec.date || !rec.venue) {
            skipped++;
            return;
          }
          // Assign id if missing
          if(!rec.id){
            rec.id = Date.now() + "-" + Math.random().toString(36).slice(2,8);
          }
          // Skip if id already exists
          if(existingIds[rec.id]){
            skipped++;
            return;
          }
          // Skip if same (date, session, venue, level, amount) fingerprint exists
          var fp = fingerprint(rec);
          if(existingPrints[fp]){
            skipped++;
            return;
          }
          // Accept
          entries.push(rec);
          existingIds[rec.id] = true;
          existingPrints[fp] = true;
          added++;
        });

        saveEntries();
        render();

        if(added === 0){
          showToast("所有记录均已存在，未导入新数据", "err");
        } else if(skipped > 0){
          showToast("已导入 " + added + " 条，跳过 " + skipped + " 条重复 ✓", "ok");
        } else {
          showToast("成功导入 " + added + " 条记录 ✓", "ok");
        }
      }catch(err){
        showToast("解析失败：文件格式不正确", "err");
      }
    };
    reader.readAsText(file);
  });


  // ============================================================
  // ANALYSIS PANEL
  // ============================================================
  (function(){
    var overlay = document.getElementById("analysisOverlay");
    var panel   = document.getElementById("analysisPanel");
    var backBtn = document.getElementById("analysisBack");
    var tabAmt  = document.getElementById("analTabAmt");
    var tabScore= document.getElementById("analTabScore");
    var legendEl= document.getElementById("chartLegend");
    var emptyEl = document.getElementById("chartEmpty");
    var canvas  = document.getElementById("mainChart");
    var ctx     = canvas.getContext("2d");

    var analMode   = "amount";  // "amount" | "score"
    var analPeriod = "year";    // "year" | "month" | "day"
    var chartInst  = null;

    document.getElementById("analysisBtn").addEventListener("click", openAnalysis);
    backBtn.addEventListener("click", closeAnalysis);
    overlay.addEventListener("click", closeAnalysis);

    function openAnalysis(){
      overlay.classList.add("open");
      panel.classList.add("open");
      document.body.style.overflow = "hidden";
      drawChart();
    }
    function closeAnalysis(){
      overlay.classList.remove("open");
      panel.classList.remove("open");
      document.body.style.overflow = "";
    }

    tabAmt.addEventListener("click", function(){
      analMode = "amount";
      tabAmt.classList.add("active"); tabScore.classList.remove("active");
      drawChart();
    });
    tabScore.addEventListener("click", function(){
      analMode = "score";
      tabScore.classList.add("active"); tabAmt.classList.remove("active");
      drawChart();
    });

    panel.querySelectorAll(".period-tab").forEach(function(t){
      t.addEventListener("click", function(){
        panel.querySelectorAll(".period-tab").forEach(function(x){ x.classList.remove("active"); });
        t.classList.add("active");
        analPeriod = t.getAttribute("data-period");
        drawChart();
      });
    });

    // ---- data aggregation ----
    function groupKey(iso){
      if(analPeriod==="year")  return iso.slice(0,4);
      if(analPeriod==="month") return iso.slice(0,7);
      return iso;
    }
    function labelFor(key){
      if(analPeriod==="year")  return key+"年";
      if(analPeriod==="month"){
        var p = key.split("-"); return p[0]+"年"+parseInt(p[1],10)+"月";
      }
      var d = parseISO(key);
      return (d.getMonth()+1)+"月"+d.getDate()+"日";
    }

    function buildAmountData(){
      var map = {};
      entries.forEach(function(e){
        var k = groupKey(e.date);
        if(!map[k]) map[k]=0;
        map[k] += (e.sign==="-"?-1:1) * e.amount;
      });
      var keys = Object.keys(map).sort();
      return {
        labels: keys.map(labelFor),
        datasets:[{
          label:"盈亏 (HK$)",
          data: keys.map(function(k){ return Math.round(map[k]); }),
          borderColor:"#C9A24B",
          backgroundColor:"rgba(201,162,75,0.12)",
          pointBackgroundColor:"#E0BC6A",
          pointRadius:4,
          tension:0.35,
          fill:true
        }]
      };
    }

    var SCORE_COLORS = ["#8B6BB0","#C9A24B","#5A9A8A","#C2645C","#6A8EC2"];
    var CRITERIA_LOCAL = [
      { key:"observe", name:"观察" },
      { key:"aggro",   name:"进攻" },
      { key:"discip",  name:"弃牌" },
      { key:"emotion", name:"情绪" },
      { key:"review",  name:"复盘" }
    ];

    function buildScoreData(){
      var maps = {};
      CRITERIA_LOCAL.forEach(function(c){ maps[c.key]={}; });
      var totalMap = {};
      entries.forEach(function(e){
        var k = groupKey(e.date);
        if(!maps[CRITERIA_LOCAL[0].key][k]){
          CRITERIA_LOCAL.forEach(function(c){ maps[c.key][k]=[]; });
          totalMap[k]=[];
        }
        CRITERIA_LOCAL.forEach(function(c){ maps[c.key][k].push(e.scores[c.key]||0); });
        var t=0; CRITERIA_LOCAL.forEach(function(c){ t+=e.scores[c.key]||0; });
        totalMap[k].push(t);
      });
      var keys = Object.keys(totalMap).sort();
      var avg = function(arr){ return arr.length ? Math.round(arr.reduce(function(a,b){return a+b;},0)/arr.length*10)/10 : null; };
      var datasets = CRITERIA_LOCAL.map(function(c,i){
        return {
          label: c.name,
          data: keys.map(function(k){ return avg(maps[c.key][k]); }),
          borderColor: SCORE_COLORS[i],
          backgroundColor: "transparent",
          pointBackgroundColor: SCORE_COLORS[i],
          pointRadius:3,
          tension:0.35,
          fill:false
        };
      });
      datasets.push({
        label:"总分",
        data: keys.map(function(k){ return avg(totalMap[k]); }),
        borderColor:"#E8E4D8",
        backgroundColor:"rgba(232,228,216,0.06)",
        pointBackgroundColor:"#E8E4D8",
        pointRadius:4,
        borderWidth:2.5,
        tension:0.35,
        fill:true
      });
      return { labels: keys.map(labelFor), datasets: datasets };
    }

    function drawChart(){
      if(entries.length===0){ emptyEl.style.display="flex"; canvas.style.display="none"; legendEl.innerHTML=""; return; }
      emptyEl.style.display="none"; canvas.style.display="block";

      var data = analMode==="amount" ? buildAmountData() : buildScoreData();

      // legend
      legendEl.innerHTML = "";
      data.datasets.forEach(function(ds){
        var item = document.createElement("div"); item.className="legend-item";
        var dot  = document.createElement("div"); dot.className="legend-dot";
        dot.style.background = ds.borderColor;
        var lbl  = document.createElement("span"); lbl.textContent = ds.label;
        item.appendChild(dot); item.appendChild(lbl);
        legendEl.appendChild(item);
      });

      // destroy previous chart
      if(chartInst){ chartInst.destroy(); chartInst=null; }

      // scale canvas to parent
      var wrap = canvas.parentElement;
      canvas.width  = wrap.clientWidth  * (window.devicePixelRatio||1);
      canvas.height = wrap.clientHeight * (window.devicePixelRatio||1);
      canvas.style.width  = wrap.clientWidth  + "px";
      canvas.style.height = wrap.clientHeight + "px";
      ctx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);

      var w = wrap.clientWidth;
      var h = wrap.clientHeight;
      var pad = { top:16, right:14, bottom:44, left: analMode==="amount" ? 70 : 42 };
      var innerW = w - pad.left - pad.right;
      var innerH = h - pad.top  - pad.bottom;

      // flatten all data points
      var allVals = [];
      data.datasets.forEach(function(ds){ ds.data.forEach(function(v){ if(v!==null) allVals.push(v); }); });
      if(!allVals.length){ emptyEl.style.display="flex"; canvas.style.display="none"; return; }

      var minV = Math.min.apply(null,allVals);
      var maxV = Math.max.apply(null,allVals);
      if(minV===maxV){ minV -= 1; maxV += 1; }
      // nice padding
      var range = maxV - minV;
      minV -= range*0.12; maxV += range*0.12;

      var n = data.labels.length;
      var xStep = n>1 ? innerW/(n-1) : innerW/2;

      function xOf(i){ return pad.left + (n>1 ? i*xStep : innerW/2); }
      function yOf(v){ return pad.top + innerH - (v - minV)/(maxV - minV)*innerH; }

      ctx.clearRect(0,0,w,h);
      ctx.font = "11px 'IBM Plex Mono', monospace";
      ctx.fillStyle = "rgba(90,122,106,0.9)";

      // draw grid + y-axis labels
      var yTicks = 5;
      ctx.strokeStyle = "rgba(44,56,48,0.7)";
      ctx.lineWidth   = 1;
      for(var t=0;t<=yTicks;t++){
        var frac = t/yTicks;
        var val  = minV + frac*(maxV-minV);
        var yy   = pad.top + innerH*(1-frac);
        ctx.beginPath(); ctx.moveTo(pad.left,yy); ctx.lineTo(pad.left+innerW,yy); ctx.stroke();
        var label = analMode==="amount" ? (val>=0?"+":"")+Math.round(val).toLocaleString() : val.toFixed(1);
        ctx.fillText(label, 0, yy+4);
      }

      // draw x-axis labels
      var maxLabels = Math.floor(innerW/52);
      var step = Math.max(1, Math.ceil(n/maxLabels));
      for(var i=0;i<n;i++){
        if(i%step!==0 && i!==n-1) continue;
        var xx = xOf(i);
        ctx.fillText(data.labels[i], xx, pad.top+innerH+18);
      }

      // draw zero line for amount
      if(analMode==="amount" && minV<0 && maxV>0){
        var yz = yOf(0);
        ctx.save();
        ctx.strokeStyle = "rgba(201,162,75,0.3)";
        ctx.setLineDash([4,4]);
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(pad.left,yz); ctx.lineTo(pad.left+innerW,yz); ctx.stroke();
        ctx.restore();
      }

      // draw datasets
      data.datasets.forEach(function(ds){
        if(!ds.data.some(function(v){ return v!==null; })) return;
        ctx.save();
        ctx.strokeStyle = ds.borderColor;
        ctx.lineWidth = ds.borderWidth || 2;
        ctx.lineJoin = "round";

        if(ds.fill && ds.backgroundColor !== "transparent"){
          ctx.beginPath();
          var first=true;
          ds.data.forEach(function(v,i){
            if(v===null) return;
            var x=xOf(i), y=yOf(v);
            if(first){ ctx.moveTo(x,y); first=false; }
            else { ctx.lineTo(x,y); }
          });
          var lastIdx = ds.data.length-1;
          while(lastIdx>=0 && ds.data[lastIdx]===null) lastIdx--;
          if(lastIdx>=0){
            ctx.lineTo(xOf(lastIdx), yOf(minV));
            ctx.lineTo(xOf(0), yOf(minV));
          }
          ctx.closePath();
          ctx.fillStyle = ds.backgroundColor;
          ctx.fill();
        }

        ctx.beginPath();
        var prevX,prevY, first2=true;
        ds.data.forEach(function(v,i){
          if(v===null){ first2=true; return; }
          var x=xOf(i), y=yOf(v);
          if(first2){ ctx.moveTo(x,y); first2=false; }
          else { ctx.lineTo(x,y); }
          prevX=x; prevY=y;
        });
        ctx.stroke();

        // dots
        var pr = ds.pointRadius||3;
        ctx.fillStyle = ds.pointBackgroundColor || ds.borderColor;
        ds.data.forEach(function(v,i){
          if(v===null) return;
          ctx.beginPath();
          ctx.arc(xOf(i),yOf(v),pr,0,Math.PI*2);
          ctx.fill();
        });
        ctx.restore();
      });
    }

    // redraw on resize
    window.addEventListener("resize", function(){ if(panel.classList.contains("open")) drawChart(); });
  })();

  // ============================================================
  // HANDS LOG PANEL
  // ============================================================
  (function(){
    var overlay = document.getElementById("handsLogOverlay");
    var panel   = document.getElementById("handsLogPanel");
    var backBtn = document.getElementById("handsLogBack");
    var scroll  = document.getElementById("handsLogScroll");

    document.getElementById("handsLogBtn").addEventListener("click", openHandsLog);
    backBtn.addEventListener("click", closeHandsLog);
    overlay.addEventListener("click", closeHandsLog);

    function openHandsLog(){
      overlay.classList.add("open");
      panel.classList.add("open");
      document.body.style.overflow = "hidden";
      renderHandsLog();
    }
    function closeHandsLog(){
      overlay.classList.remove("open");
      panel.classList.remove("open");
      document.body.style.overflow = "";
    }

    function renderHandsLog(){
      scroll.innerHTML = "";
      // collect all entries that have hands, newest first
      var withHands = entries
        .filter(function(e){ return e.hands && e.hands.length>0; })
        .slice()
        .sort(function(a,b){
          if(a.date!==b.date) return a.date>b.date ? -1 : 1;
          return b.session - a.session;
        });

      if(!withHands.length){
        var emp = document.createElement("div"); emp.className="hl-empty";
        emp.textContent="还没有关键牌局记录"; scroll.appendChild(emp); return;
      }

      withHands.forEach(function(e){
        var el = document.createElement("div"); el.className="hl-entry";
        var header = document.createElement("div"); header.className="hl-header";
        var meta   = document.createElement("div"); meta.className="hl-meta";
        var dateDiv= document.createElement("div"); dateDiv.className="hl-date";
        dateDiv.textContent = formatCN(e.date)+"  Session "+e.session;
        var sub    = document.createElement("div"); sub.className="hl-sub";
        sub.textContent = VENUE_LABEL[e.venue]+" · "+e.level;
        meta.appendChild(dateDiv); meta.appendChild(sub);
        var cnt    = document.createElement("div"); cnt.className="hl-count";
        cnt.textContent = e.hands.length+"手";
        var arrow  = document.createElement("div"); arrow.className="hl-arrow";
        arrow.textContent = "›";
        header.appendChild(meta); header.appendChild(cnt); header.appendChild(arrow);
        el.appendChild(header);

        var body = document.createElement("div"); body.className="hl-body";
        e.hands.forEach(function(h,i){
          var wrap2 = document.createElement("div");
          var num   = document.createElement("div"); num.className="hl-hand-num";
          num.textContent="第 "+(i+1)+" 手";
          var txt   = document.createElement("div"); txt.className="hl-hand";
          txt.textContent = h;
          wrap2.appendChild(num); wrap2.appendChild(txt);
          body.appendChild(wrap2);
        });
        el.appendChild(body);

        header.addEventListener("click", function(){
          el.classList.toggle("expanded");
        });

        scroll.appendChild(el);
      });
    }
  })();

  // ---------- Mobile zoom prevention ----------
  document.addEventListener('touchmove', function(e){
    if(e.scale && e.scale !== 1){ e.preventDefault(); }
  }, { passive: false });
  document.addEventListener('gesturestart', function(e){ e.preventDefault(); });
  document.addEventListener('gesturechange', function(e){ e.preventDefault(); });
  document.addEventListener('gestureend', function(e){ e.preventDefault(); });

  // ---------- Init ----------
  render();

  // scroll list to bottom (latest entries) on load
  window.addEventListener("load", function(){
    window.scrollTo(0, document.body.scrollHeight);
  });
})();
</script>
