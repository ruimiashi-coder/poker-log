<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>牌局记录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@400;500;600;700&family=Spectral:ital@1&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0F1411;
    --card: #1B2420;
    --card-raised: #212C26;
    --line: #2C3830;
    --ink: #E8E4D8;
    --ink-dim: #9CAA9F;
    --ink-faint: #5A7A6A;
    --gold: #C9A24B;
    --gold-bright: #E0BC6A;
    --loss: #B5524A;
    --loss-bright: #C96A60;
    --suit-red: #C2645C;
    --venetian: #8B6BB0;
    --mgm: #C9A24B;
    --radius: 16px;
    --radius-sm: 10px;
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    min-height: 100vh;
    overscroll-behavior-y: contain;
  }

  body{
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(201,162,75,0.07), transparent),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px, transparent 1px, transparent 3px);
  }

  .serif{ font-family: 'Spectral', serif; }

  /* ---------- App shell ---------- */
  #app{
    max-width: 560px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    padding-bottom: 100px;
  }

  header.top{
    padding: 28px 20px 18px;
    position: relative;
  }
  header.top::after{
    content:"";
    position:absolute; left:20px; right:20px; bottom:0;
    height:1px;
    background: linear-gradient(90deg, transparent, var(--line) 15%, var(--line) 85%, transparent);
  }

  .header-tools{
    display:flex;
    gap: 7px;
    margin-bottom: 16px;
  }
  .icon-btn{
    width: 32px; height: 32px;
    border-radius: 9px;
    background: var(--card);
    border: 1px solid var(--line);
    color: var(--ink-dim);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex-shrink:0;
  }
  .icon-btn svg{ width:16px; height:16px; }
  .icon-btn:active{ background: var(--card-raised); }
  .hidden-file-input{ display:none; }

  .toast{
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%) translateY(-14px);
    background: var(--card-raised);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    padding: 10px 18px;
    border-radius: 999px;
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    box-shadow: 0 10px 28px rgba(0,0,0,0.4);
    white-space: nowrap;
    max-width: calc(100vw - 40px);
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .eyebrow{
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin: 0 0 6px;
  }
  h1.title{
    font-family: 'Spectral', serif;
    font-weight: 600;
    font-size: 28px;
    margin: 0;
    color: var(--ink);
    letter-spacing: 0.01em;
  }
  h1.title em{
    font-style: italic;
    color: var(--gold);
    font-weight: 500;
  }

  .summary-row{
    display:flex; gap: 10px;
    margin-top: 18px;
  }
  .summary-chip{
    flex:1;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
  }
  .summary-chip .label{
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--ink-faint);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .summary-chip .val{
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .val.pos{ color: var(--gold-bright); }
  .val.neg{ color: var(--loss-bright); }

  .nav-row{
    display:flex;
    gap: 8px;
    margin-top: 10px;
  }
  .nav-btn{
    flex:1;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    color: var(--ink-dim);
    font-family: 'Spectral', serif;
    font-size: 12.5px;
    font-weight: 500;
    padding: 10px 4px;
    cursor: pointer;
    text-align:center;
    white-space: nowrap;
  }
  .nav-btn:active{ background: var(--card-raised); border-color: var(--gold); color: var(--ink); }

  /* ---------- Timeline list ---------- */
  #list{
    padding: 22px 16px 10px;
    display:flex;
    flex-direction: column-reverse; /* oldest visually first via column-reverse + DOM order */
    gap: 10px;
  }

  .day-group{
    display:flex;
    flex-direction: column;
    gap: 8px;
  }
  .day-label{
    font-family:'Spectral', serif;
    font-size: 13px;
    color: var(--ink-faint);
    padding: 6px 4px 2px;
    letter-spacing: 0.02em;
  }

  .entry{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px 16px;
    display:flex;
    align-items:center;
    gap: 14px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform .15s ease, border-color .15s ease;
  }
  .entry:active{ transform: scale(0.98); }
  .entry::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0;
    width: 3px;
  }
  .entry.venue-venetian::before{ background: var(--venetian); }
  .entry.venue-mgm::before{ background: var(--mgm); }

  .entry .ring{
    flex-shrink:0;
    width: 50px; height:50px;
    position: relative;
    display:flex; align-items:center; justify-content:center;
  }
  .entry .ring svg{ width:50px; height:50px; transform: rotate(-90deg); }
  .entry .ring .track{ fill:none; stroke: var(--line); stroke-width:4; }
  .entry .ring .prog{ fill:none; stroke-width:4; stroke-linecap: round; }
  .entry .ring .score-text{
    position:absolute;
    font-size: 13px;
    font-weight:600;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }

  .entry .mid{
    flex:1;
    min-width:0;
  }
  .entry .date-line{
    font-family:'Spectral', serif;
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
  }
  .entry .meta-line{
    font-size: 11px;
    color: var(--ink-faint);
    margin-top: 3px;
    letter-spacing: 0.03em;
  }
  .entry .meta-line .dot{ margin: 0 5px; opacity:.5; }

  .entry .amount{
    flex-shrink:0;
    text-align:right;
    font-size: 17px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .entry .amount .unit{
    font-size: 11px;
    font-weight: 400;
    color: var(--ink-faint);
    margin-right: 2px;
  }

  /* ---------- Empty state ---------- */
  #empty{
    padding: 70px 30px 30px;
    text-align:center;
    color: var(--ink-faint);
    display:none;
  }
  #empty .glyph{
    font-size: 34px;
    margin-bottom: 14px;
    opacity: .55;
  }
  #empty .et{
    font-family:'Spectral', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  #empty .es{
    font-size: 12.5px;
    line-height:1.6;
  }

  /* ---------- FAB ---------- */
  #fab{
    position: fixed;
    right: max(20px, calc((100vw - 560px)/2 + 20px));
    bottom: 26px;
    width: 58px; height:58px;
    border-radius: 50%;
    background: linear-gradient(155deg, var(--gold-bright), var(--gold) 65%);
    border: none;
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 8px 24px rgba(201,162,75,0.35), 0 2px 8px rgba(0,0,0,0.4);
    cursor: pointer;
    z-index: 50;
    transition: transform .15s ease;
  }
  #fab:active{ transform: scale(0.92); }
  #fab svg{ width:26px; height:26px; }

  /* ---------- Sheet (bottom drawer) ---------- */
  .sheet-overlay{
    position: fixed; inset:0;
    background: rgba(7,10,8,0.6);
    backdrop-filter: blur(2px);
    z-index: 100;
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease;
  }
  .sheet-overlay.open{ opacity:1; pointer-events:auto; }

  .sheet{
    position: fixed;
    left:0; right:0; bottom:0;
    max-width: 560px;
    margin: 0 auto;
    max-height: 92vh;
    background: var(--bg);
    border-radius: 22px 22px 0 0;
    border-top: 1px solid var(--line);
    box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
    z-index: 101;
    transform: translateY(100%);
    transition: transform .32s cubic-bezier(.32,.72,0,1);
    display:flex;
    flex-direction: column;
  }
  .sheet.open{ transform: translateY(0); }

  .sheet-handle{
    width: 36px; height:4px;
    background: var(--line);
    border-radius:2px;
    margin: 12px auto 4px;
    flex-shrink:0;
  }

  .sheet-head{
    padding: 10px 20px 14px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    flex-shrink:0;
  }
  .sheet-head h2{
    font-family:'Spectral', serif;
    font-size: 19px;
    font-weight: 600;
    margin:0;
  }
  .sheet-close{
    width:30px; height:30px;
    border-radius:50%;
    background: var(--card);
    border:1px solid var(--line);
    color: var(--ink-dim);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size: 15px;
  }

  .sheet-body{
    overflow-y: auto;
    padding: 4px 20px 24px;
    flex:1;
  }

  .field{
    margin-bottom: 22px;
  }
  .field-label{
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 9px;
    display:flex;
    align-items:center;
    justify-content: space-between;
  }

  /* Date control */
  .date-control{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    display:flex;
    align-items:center;
    justify-content: space-between;
    cursor:pointer;
  }
  .date-control .dtext{
    font-family:'Spectral', serif;
    font-size: 16px;
    color: var(--ink);
  }
  .date-control .dicon{ color: var(--ink-faint); font-size:16px; }

  input[type="date"].native-date{
    position:absolute;
    opacity:0;
    pointer-events:none;
    width:1px; height:1px;
  }

  /* Session control */
  .session-row{
    display:flex;
    align-items:center;
    gap: 14px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 8px 8px;
  }
  .stepper-btn{
    width: 38px; height:38px;
    border-radius: 9px;
    background: var(--card-raised);
    border: 1px solid var(--line);
    color: var(--ink);
    font-size: 18px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    flex-shrink:0;
    user-select:none;
  }
  .stepper-btn:active{ background: var(--line); }
  .session-val{
    flex:1;
    text-align:center;
    font-size: 18px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .session-hint{
    font-size: 10.5px;
    color: var(--ink-faint);
    margin-top: 7px;
    line-height:1.5;
  }

  /* Duration slider */
  .duration-val{
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink-faint);
    transition: color .15s ease;
  }
  .duration-val.set{ color: var(--gold-bright); }
  .duration-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 16px 13px;
  }
  .duration-ticks{
    display:flex;
    justify-content: space-between;
    margin-top: 9px;
    font-size: 10.5px;
    color: var(--ink-faint);
  }

  /* Pill toggle group */
  .pill-group{
    display:flex;
    gap: 9px;
  }
  .pill{
    flex:1;
    padding: 12px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-dim);
    text-align:center;
    font-family: 'Spectral', serif;
    font-size: 14.5px;
    font-weight: 500;
    cursor:pointer;
    position:relative;
    transition: border-color .15s ease, color .15s ease, background .15s ease;
  }
  .pill .check{
    position:absolute; top:7px; right:9px;
    width:14px; height:14px;
    opacity:0;
    transition: opacity .15s ease;
  }
  .pill.selected .check{ opacity:1; }
  .pill[data-venue="venetian"].selected{
    border-color: var(--venetian);
    color: var(--ink);
    background: rgba(139,107,176,0.12);
  }
  .pill[data-venue="venetian"].selected .check{ color: var(--venetian); }
  .pill[data-venue="mgm"].selected{
    border-color: var(--mgm);
    color: var(--ink);
    background: rgba(201,162,75,0.1);
  }
  .pill[data-venue="mgm"].selected .check{ color: var(--mgm); }
  .pill[data-level].selected{
    border-color: var(--gold);
    color: var(--ink);
    background: rgba(201,162,75,0.1);
  }
  .pill[data-level].selected .check{ color: var(--gold); }
  .pill.small{ font-family:'IBM Plex Mono', monospace; font-size:14px; font-weight:600; }

  /* Sliders */
  .slider-block{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 6px 16px 4px;
  }
  .slider-item{
    padding: 14px 0;
    border-bottom: 1px solid var(--line);
  }
  .slider-item:last-child{ border-bottom:none; }
  .slider-item .si-top{
    display:flex;
    justify-content: space-between;
    align-items:baseline;
    margin-bottom: 10px;
  }
  .slider-item .si-name{
    font-family:'Spectral', serif;
    font-size: 14.5px;
    color: var(--ink);
  }
  .slider-item .si-val{
    font-size: 14px;
    font-weight:600;
    color: var(--gold-bright);
    font-variant-numeric: tabular-nums;
    min-width: 34px;
    text-align:right;
  }

  .rng{
    -webkit-appearance:none;
    appearance:none;
    width:100%;
    height: 4px;
    background: var(--line);
    border-radius:2px;
    outline:none;
    margin:0;
    position:relative;
  }
  .rng::-webkit-slider-runnable-track{
    height:4px;
    background: var(--line);
    border-radius:2px;
  }
  .rng::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:18px; height:18px;
    margin-top:-7px;
    background: var(--gold-bright);
    border-radius: 4px;
    transform: rotate(45deg);
    border: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    cursor:pointer;
  }
  .rng::-moz-range-track{
    height:4px;
    background: var(--line);
    border-radius:2px;
  }
  .rng::-moz-range-thumb{
    width:14px; height:14px;
    background: var(--gold-bright);
    border-radius:4px;
    transform: rotate(45deg);
    border:none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    cursor:pointer;
  }

  .total-card{
    margin-top: 16px;
    background: linear-gradient(135deg, rgba(201,162,75,0.14), rgba(201,162,75,0.04));
    border: 1px solid rgba(201,162,75,0.35);
    border-radius: var(--radius);
    padding: 16px 18px;
    display:flex;
    align-items:center;
    justify-content: space-between;
  }
  .total-card .tt-label{
    font-family:'Spectral', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-dim);
  }
  .total-card .tt-val{
    font-size: 24px;
    font-weight:700;
    color: var(--gold-bright);
    font-variant-numeric: tabular-nums;
  }
  .total-card .tt-val .tt-max{
    font-size: 14px;
    color: var(--ink-faint);
    font-weight:500;
  }

  /* Amount field */
  .amount-row{
    display:flex;
    gap: 10px;
  }
  .sign-toggle{
    display:flex;
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    overflow:hidden;
    flex-shrink:0;
  }
  .sign-btn{
    width: 46px; height: 100%;
    min-height: 50px;
    display:flex; align-items:center; justify-content:center;
    background: var(--card);
    color: var(--ink-faint);
    font-size: 19px;
    font-weight:600;
    cursor:pointer;
    border:none;
  }
  .sign-btn + .sign-btn{ border-left: 1px solid var(--line); }
  .sign-btn.active.plus{ background: rgba(201,162,75,0.18); color: var(--gold-bright); }
  .sign-btn.active.minus{ background: rgba(181,82,74,0.18); color: var(--loss-bright); }

  .amount-input-wrap{
    flex:1;
    display:flex;
    align-items:center;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 0 14px;
  }
  .hkd-sym{
    font-family:'Spectral', serif;
    font-weight:600;
    font-size: 16px;
    color: var(--ink-faint);
    margin-right: 8px;
  }
  .amount-input-wrap input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color: var(--ink);
    font-family:'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight:600;
    padding: 13px 0;
    min-width:0;
    font-variant-numeric: tabular-nums;
  }
  .amount-input-wrap input::placeholder{ color: var(--ink-faint); font-weight:400; }
  /* hide number spinners */
  .amount-input-wrap input::-webkit-outer-spin-button,
  .amount-input-wrap input::-webkit-inner-spin-button{ -webkit-appearance:none; margin:0; }
  .amount-input-wrap input[type=number]{ -moz-appearance: textfield; }

  /* Save button */
  .sheet-footer{
    padding: 6px 20px 28px;
    flex-shrink:0;
  }
  .save-btn{
    width:100%;
    padding: 16px;
    border-radius: var(--radius);
    border:none;
    background: linear-gradient(155deg, var(--gold-bright), var(--gold) 70%);
    color: #1A1408;
    font-family:'Spectral', serif;
    font-weight:600;
    font-size: 16.5px;
    letter-spacing: 0.02em;
    cursor:pointer;
    box-shadow: 0 6px 18px rgba(201,162,75,0.25);
  }
  .save-btn:active{ transform: scale(0.99); }

  .delete-btn{
    width:100%;
    padding: 13px;
    border-radius: var(--radius-sm);
    border: 1px solid rgba(181,82,74,0.4);
    background: rgba(181,82,74,0.08);
    color: var(--loss-bright);
    font-family:'IBM Plex Mono', monospace;
    font-size: 13.5px;
    font-weight:600;
    cursor:pointer;
    margin-top: 10px;
  }

  /* ---------- Key hands (关键牌局) ---------- */
  .hands-drag-zone{
    position: relative;
    height: 0;
    transition: height .2s ease;
  }
  .hand-card{
    position: absolute;
    left:0; right:0; top:0;
    height: 50px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    display:flex;
    align-items:center;
    gap: 4px;
    padding: 0 6px 0 2px;
    cursor: pointer;
    touch-action: pan-y;
  }
  .hand-card.dragging{
    box-shadow: 0 10px 26px rgba(0,0,0,0.45);
    border-color: var(--gold);
    background: var(--card-raised);
    transform: scale(1.015);
  }
  .hand-handle{
    flex-shrink:0;
    width: 34px;
    height: 100%;
    display:flex;
    align-items:center;
    justify-content:center;
    color: var(--ink-faint);
    font-size: 15px;
    letter-spacing: -1px;
    cursor: grab;
    touch-action: none;
    user-select: none;
  }
  .hand-handle:active{ cursor: grabbing; color: var(--ink-dim); }
  .hand-preview{
    flex:1;
    min-width:0;
    font-family:'Spectral', serif;
    font-size: 13.5px;
    color: var(--ink-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hand-index{
    flex-shrink:0;
    font-size: 10px;
    color: var(--ink-faint);
    font-family:'IBM Plex Mono', monospace;
    width: 16px;
    text-align:center;
  }
  .hand-arrow{
    flex-shrink:0;
    color: var(--ink-faint);
    font-size: 16px;
    padding-right: 4px;
  }

  .hand-add{
    margin-top: 8px;
    height: 46px;
    border-radius: var(--radius-sm);
    border: 1px dashed var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 7px;
    color: var(--ink-faint);
    font-family:'Spectral', serif;
    font-size: 13.5px;
    cursor:pointer;
  }
  .hand-add:active{ background: var(--card); }
  .hand-add .plus-icon{
    font-size: 16px;
    line-height:1;
    color: var(--gold);
  }
  .hand-add.disabled{
    display:none;
  }

  /* ---------- Full-screen hand editor ---------- */
  .hand-editor{
    position: fixed;
    inset: 0;
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg);
    z-index: 200;
    display:flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
  }
  .hand-editor.open{ transform: translateY(0); }

  .he-topbar{
    position: relative;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 16px 16px 14px;
    border-bottom: 1px solid var(--line);
  }
  .he-title{
    position:absolute;
    left:50%; top:50%;
    transform: translate(-50%,-50%);
    font-family:'Spectral', serif;
    font-size: 14.5px;
    color: var(--ink-faint);
    pointer-events:none;
  }
  .he-delete, .he-save{
    border:none;
    background:none;
    font-family:'IBM Plex Mono', monospace;
    font-size: 14.5px;
    font-weight:600;
    cursor:pointer;
    padding: 7px 4px;
    z-index:1;
  }
  .he-delete{ color: var(--loss-bright); }
  .he-save{ color: var(--gold-bright); }

  .he-suits{
    flex-shrink:0;
    display:flex;
    gap: 9px;
    padding: 16px 16px 4px;
  }
  .suit-btn{
    flex:1;
    aspect-ratio: 1.5;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
    background: var(--card);
    font-size: 22px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .suit-btn:active{ background: var(--card-raised); }
  .suit-btn.suit-black{ color: var(--ink); }
  .suit-btn.suit-red{ color: var(--suit-red); }

  .he-textarea{
    flex:1;
    width:100%;
    background: transparent;
    border:none;
    outline:none;
    resize:none;
    padding: 18px 20px 28px;
    color: var(--ink);
    font-family:'Spectral', serif;
    font-size: 16px;
    line-height: 1.75;
  }
  .he-textarea::placeholder{ color: var(--ink-faint); }

  /* ---------- Full-screen stat page (charts + hands overview) ---------- */
  .stat-page{
    position: fixed;
    inset: 0;
    max-width: 560px;
    margin: 0 auto;
    background: var(--bg);
    z-index: 190;
    display:flex;
    flex-direction: column;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(.32,.72,0,1);
  }
  .stat-page.open{ transform: translateY(0); }

  .sp-topbar{
    position: relative;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 14px 8px 14px 4px;
    border-bottom: 1px solid var(--line);
  }
  .sp-back{
    width: 38px; height:38px;
    border-radius: 50%;
    background: none;
    border:none;
    color: var(--ink-dim);
    font-size: 24px;
    line-height:1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
  }
  .sp-back:active{ background: var(--card); }
  .sp-title{
    position:absolute;
    left:50%; top:50%;
    transform: translate(-50%,-50%);
    font-family:'Spectral', serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--ink);
    pointer-events:none;
  }
  .sp-spacer{ width:38px; flex-shrink:0; }

  .sp-body{
    flex:1;
    overflow-y: auto;
    padding: 20px 20px 40px;
  }

  /* -- chart page -- */
  .sp-current{
    text-align:center;
    margin-bottom: 22px;
  }
  .sp-current-label{
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 6px;
  }
  .sp-current-val{
    font-family:'IBM Plex Mono', monospace;
    font-size: 34px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    color: var(--gold-bright);
  }
  .sp-current-val.neg{ color: var(--loss-bright); }

  .chart-wrap{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px 14px 14px;
  }
  .trend-svg{ width:100%; height:auto; display:block; }
  .trend-line{ fill:none; stroke-width: 2.4; stroke-linecap:round; stroke-linejoin:round; }
  .trend-area{ stroke:none; }
  .zero-line{ stroke: var(--ink-faint); stroke-width:1; stroke-dasharray: 3 3; opacity:.5; }
  .trend-dot{ fill: var(--bg); stroke-width: 2.2; }
  .chart-axis-text{ font-family:'IBM Plex Mono',monospace; font-size:9px; fill: var(--ink-faint); }

  .chart-axis-labels{
    display:flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 10.5px;
    color: var(--ink-faint);
  }

  .sp-chart-meta{
    text-align:center;
    margin-top: 14px;
    font-size: 11.5px;
    color: var(--ink-faint);
  }

  /* period toggle (年 / 月 / 日) */
  .period-toggle{
    display:flex;
    gap: 6px;
    justify-content:center;
    margin-bottom: 18px;
  }
  .period-btn{
    padding: 6px 18px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink-dim);
    font-family:'IBM Plex Mono', monospace;
    font-size: 12.5px;
    font-weight:600;
    cursor:pointer;
    transition: border-color .15s ease, color .15s ease, background .15s ease;
  }
  .period-btn.active{
    background: rgba(201,162,75,0.14);
    border-color: var(--gold);
    color: var(--gold-bright);
  }
  .period-btn:active{ opacity:.7; }

  /* multi-series legend */
  .series-legend{
    display:flex;
    flex-wrap:wrap;
    gap: 8px 14px;
    margin-top: 14px;
    justify-content:center;
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap: 6px;
    font-size: 11px;
    color: var(--ink-dim);
  }
  .legend-dot{
    width: 8px; height:8px;
    border-radius:50%;
    flex-shrink:0;
  }

  /* chart section title */
  .sp-section-title{
    font-family:'Spectral', serif;
    font-size: 13px;
    color: var(--ink-faint);
    margin: 22px 0 8px;
    letter-spacing: 0.04em;
  }
  .sp-section-title:first-child{ margin-top:0; }

  .chart-empty, .hands-overview-empty{
    text-align:center;
    color: var(--ink-faint);
    padding: 70px 20px;
    font-size: 13px;
    line-height: 1.7;
  }
  .chart-empty .ce-glyph, .hands-overview-empty .ce-glyph{
    font-size: 28px;
    margin-bottom: 12px;
    opacity:.5;
  }

  /* -- hands overview list -- */
  .hov-card{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius-sm);
    padding: 13px 14px;
    margin-bottom: 9px;
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .hov-card::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:3px;
  }
  .hov-card.venue-venetian::before{ background: var(--venetian); }
  .hov-card.venue-mgm::before{ background: var(--mgm); }
  .hov-card:active{ background: var(--card-raised); }
  .hov-meta{
    display:flex;
    align-items:center;
    gap: 8px;
    margin-bottom: 7px;
  }
  .hov-date{
    font-family:'Spectral', serif;
    font-size: 12.5px;
    color: var(--ink-dim);
    font-weight: 600;
  }
  .hov-tag{
    font-size: 10px;
    color: var(--ink-faint);
    background: var(--card-raised);
    border-radius: 5px;
    padding: 2px 6px;
  }
  .hov-text{
    font-family:'Spectral', serif;
    font-size: 13.5px;
    color: var(--ink);
    line-height: 1.6;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* tiny calendar (custom, since native date input styling is unreliable on mobile webviews) */
  .cal-pop{
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    margin-top: 8px;
    display:none;
  }
  .cal-pop.open{ display:block; }
  .cal-head{
    display:flex;
    align-items:center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 4px;
  }
  .cal-head .cal-nav{
    width:30px; height:30px;
    border-radius:50%;
    background: var(--card-raised);
    border:1px solid var(--line);
    color: var(--ink-dim);
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    font-size:14px;
  }
  .cal-head .cal-ym{
    font-family:'Spectral', serif;
    font-size: 14.5px;
    font-weight:600;
  }
  .cal-grid{
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap: 4px;
  }
  .cal-dow{
    text-align:center;
    font-size: 10px;
    color: var(--ink-faint);
    padding-bottom: 6px;
  }
  .cal-day{
    aspect-ratio: 1;
    display:flex; align-items:center; justify-content:center;
    font-size: 13px;
    border-radius: 8px;
    cursor:pointer;
    color: var(--ink-dim);
  }
  .cal-day.muted{ color: var(--ink-faint); opacity:.35; }
  .cal-day:hover{ background: var(--card-raised); }
  .cal-day.today{ color: var(--gold-bright); font-weight:600; }
  .cal-day.selected{ background: var(--gold); color:#1A1408; font-weight:700; }

  ::selection{ background: var(--gold); color:#1A1408; }
</style>
</head>
<body>

<div id="app">
  <header class="top">
    <div class="header-tools">
      <button class="icon-btn" id="exportBtn" aria-label="导出数据">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v10m0 0l-3.5-3.5M12 14l3.5-3.5"/><path d="M5 18h14"/></svg>
      </button>
      <button class="icon-btn" id="importBtn" aria-label="导入数据">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 14V4m0 0l-3.5 3.5M12 4l3.5 3.5"/><path d="M5 18h14"/></svg>
      </button>
      <input type="file" id="importFileInput" accept="application/json,.json" class="hidden-file-input">
    </div>
    <p class="eyebrow">Personal Log</p>
    <h1 class="title">牌局 <em>记录</em></h1>
    <div class="summary-row">
      <div class="summary-chip">
        <div class="label">总场次</div>
        <div class="val" id="statCount">0</div>
      </div>
      <div class="summary-chip">
        <div class="label">总盈亏</div>
        <div class="val" id="statTotal">HK$0</div>
      </div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" data-stat="amount">金额</button>
      <button class="nav-btn" data-stat="score">分数</button>
      <button class="nav-btn" data-stat="winrate">赢率</button>
      <button class="nav-btn" data-stat="hands">关键牌局</button>
    </div>
  </header>

  <div class="toast" id="toast"></div>

  <div id="list"></div>

  <div id="empty">
    <div class="glyph">♠︎ ♥︎</div>
    <div class="et">桌面还是空的</div>
    <div class="es">点击右下角的「+」，记下今天这一局。</div>
  </div>
</div>

<button id="fab" aria-label="添加记录">
  <svg viewBox="0 0 24 24" fill="none" stroke="#1A1408" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
</button>

<div class="sheet-overlay" id="sheetOverlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <h2 id="sheetTitle">新增记录</h2>
    <div class="sheet-close" id="sheetClose">✕</div>
  </div>

  <div class="sheet-body">

    <div class="field">
      <div class="field-label">时间</div>
      <div class="date-control" id="dateControl">
        <span class="dtext" id="dateText">2026年6月20日</span>
        <span class="dicon">📅</span>
      </div>
      <div class="cal-pop" id="calPop">
        <div class="cal-head">
          <div class="cal-nav" id="calPrev">‹</div>
          <div class="cal-ym" id="calYm">2026年6月</div>
          <div class="cal-nav" id="calNext">›</div>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>

    <div class="field">
      <div class="field-label">Session</div>
      <div class="session-row">
        <div class="stepper-btn" id="sessMinus">−</div>
        <div class="session-val" id="sessVal">1</div>
        <div class="stepper-btn" id="sessPlus">+</div>
      </div>
      <div class="session-hint" id="sessHint">这是当天的第 1 场记录</div>
    </div>

    <div class="field" id="fieldDuration">
      <div class="field-label">
        <span>时长</span>
        <span class="duration-val" id="durationVal">请拖动选择</span>
      </div>
      <div class="duration-card">
        <input type="range" class="rng" id="durationRng" min="1" max="10" step="1" value="1">

      </div>

    <div class="field" id="fieldVenue">
      <div class="field-label">场馆</div>
      <div class="pill-group">

        </div>
        <div class="pill" data-venue="mgm">
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          MGM
        </div>
      </div>

    <div class="field" id="fieldLevel">
      <div class="field-label">级别</div>
      <div class="pill-group">

          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          50/100
        </div>
        <div class="pill small" data-level="100/200">
          <svg class="check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          100/200

    <div class="field">
      <div class="field-label">本局复盘</div>
      <div class="slider-block" id="sliderBlock"></div>
      <div class="total-card">
        <span class="tt-label">总分</span>
        <span class="tt-val"><span id="totalScore">5.0</span><span class="tt-max">/10</span></span>
      </div>

    <div class="field" id="fieldAmount">

      <div class="amount-row">

          <button class="sign-btn plus active" id="signPlus">+</button>
          <button class="sign-btn minus" id="signMinus">−</button>
        </div>
        <div class="amount-input-wrap">
          <span class="hkd-sym">HK$</span>
          <input type="number" id="amountInput" inputmode="decimal" min="0" step="1" placeholder="0">
        </div>

    <div class="field">
      <div class="field-label">

  </div>

  <div class="sheet-footer">

<div class="stat-page" id="statPage">
  <div class="sp-topbar">

</div>

<div class="hand-editor" id="handEditor">
  <div class="he-topbar">
    <button class="he-delete" id="heDelete">Delete</button>

    <button class="suit-btn suit-black" data-suit="♠️">♠️</button>
    <button class="suit-btn suit-red" data-suit="♥️">♥️</button>
    <button class="suit-btn suit-black" data-suit="♣️">♣️</button>
    <button class="suit-btn suit-red" data-suit="♦️">♦️</button>
  </div>
  <textarea class="he-textarea" id="heTextarea" placeholder="位置、底池、对手范围、关键决策……把这手牌记清楚。" rows="6"></textarea>
</div>

<script>
(function(){
  "use strict";

  // ---------- Constants ----------
  var STORAGE_KEY = "poker_log_entries_v1";
  var CRITERIA = [
    { key:"observe", name:"观察细致程度" },
    { key:"aggro",   name:"进攻合理程度" },
    { key:"discip",  name:"弃牌纪律程度" },
    { key:"emotion", name:"情绪稳定程度" },
    { key:"review",  name:"复盘清晰程度" }
  ];
  var VENUE_LABEL = { venetian:"威尼斯人", mgm:"MGM" };

  // ---------- State ----------
  var entries = loadEntries();
  var editingId = null;       // null = creating new
  var draft = null;           // current form state
  var calViewYear, calViewMonth; // calendar nav state (0-indexed month)

  // ---------- Persistence ----------
  function loadEntries(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return [];
      var arr = JSON.parse(raw);
      if(!Array.isArray(arr)) return [];
      return arr;
    }catch(e){ return []; }
  }
  function saveEntries(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
    catch(e){ console.error("save failed", e); }
  }

  // ---------- Date helpers ----------
  function pad(n){ return n<10 ? "0"+n : ""+n; }
  function toISO(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
  function todayISO(){ return toISO(new Date()); }
  function parseISO(iso){
    var p = iso.split("-");
    return new Date(parseInt(p[0],10), parseInt(p[1],10)-1, parseInt(p[2],10));
  }
  function formatCN(iso){
    var d = parseISO(iso);
    return d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
  }
  var WEEKDAY_CN = ["周日","周一","周二","周三","周四","周五","周六"];

  // ---------- Derived ----------
  function sessionsOnDate(iso, excludeId){
    return entries.filter(function(e){ return e.date===iso && e.id!==excludeId; });
  }
  function nextSessionFor(iso, excludeId){
    var existing = sessionsOnDate(iso, excludeId).map(function(e){ return e.session; });
    var n = 1;
    while(existing.indexOf(n) !== -1) n++;
    return n;
  }
  function computeTotal(scores){
    var sum = 0;
    CRITERIA.forEach(function(c){ sum += scores[c.key]; });
    return Math.round(sum*10)/10;
  }

  // shared chronological sort (ascending: oldest first), used by the list,
  // and by every trend chart's cumulative calculation.
  function getChronologicalEntries(){
    return entries.slice().sort(function(a,b){
      if(a.date !== b.date) return a.date < b.date ? -1 : 1;
      return a.session - b.session;
    });
  }

  // ---------- Default draft ----------
  function freshDraft(){
    var iso = todayISO();
    var scores = {};
    CRITERIA.forEach(function(c){ scores[c.key] = 1.0; });
    return {
      id: null,
      date: iso,
      session: nextSessionFor(iso, null),
      duration: null,
      durationSet: false,
      venue: null,
      level: null,
      scores: scores,
      sign: "+",
      amount: "",
      hands: []
    };
  }

  // ---------- Rendering: list ----------
  var listEl = document.getElementById("list");
  var emptyEl = document.getElementById("empty");

  function render(){
    renderStats();
    renderList();
  }

  function renderStats(){
    var count = entries.length;
    document.getElementById("statCount").textContent = count;
    var totalAmt = 0;
    entries.forEach(function(e){
      totalAmt += (e.sign==="-" ? -1 : 1) * e.amount;
    });
    var totalEl = document.getElementById("statTotal");
    totalEl.textContent = (totalAmt>=0?"+":"−")+"HK$"+formatMoney(Math.abs(totalAmt));
    totalEl.className = "val " + (totalAmt>0?"pos":(totalAmt<0?"neg":""));
  }

  function formatMoney(n){
    n = Math.round(n*100)/100;
    var parts = n.toString().split(".");
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    return parts.join(".");
  }

  function renderList(){
    // sort ascending by date then session, so DOM order is oldest->newest;
    // combined with column-reverse the newest renders at the bottom visually,
    // and the page naturally opens scrolled to the latest entry at the bottom.
    var sorted = getChronologicalEntries();

    listEl.innerHTML = "";
    emptyEl.style.display = sorted.length ? "none" : "block";

    // group by date for day labels
    var groups = [];
    var lastDate = null;
    sorted.forEach(function(e){
      if(e.date !== lastDate){
        groups.push({ date:e.date, items:[] });
        lastDate = e.date;
      }
      groups[groups.length-1].items.push(e);
    });

    // since #list is column-reverse, append groups in normal order
    // (first group = earliest date) and the browser will flip visual order.
    groups.forEach(function(g){
      var groupEl = document.createElement("div");
      groupEl.className = "day-group";

      var label = document.createElement("div");
      label.className = "day-label";
      label.textContent = formatCN(g.date) + (g.items.length>1 ? "（"+g.items.length+"局）" : "");
      groupEl.appendChild(label);

      g.items.forEach(function(e){
        groupEl.appendChild(renderEntryCard(e));
      });

      listEl.appendChild(groupEl);
    });
  }

  function renderEntryCard(e){

            'stroke-dasharray="'+dash.toFixed(1)+' '+circ.toFixed(1)+'"/>'+

        '<div class="score-text">'+total.toFixed(1)+'</div>'+

    calViewMonth--;

    renderCalendar();

  document.getElementById("calNext").addEventListener("click", function(){

  function renderCalendar(){
    document.getElementById("calYm").textContent = calViewYear+"年"+(calViewMonth+1)+"月";
    var grid = document.getElementById("calGrid");
    grid.innerHTML = "";
    WEEKDAY_CN.forEach(function(w){
      var el = document.createElement("div");
      el.className = "cal-dow";
      el.textContent = w.replace("周","");
      grid.appendChild(el);
    });

    var firstOfMonth = new Date(calViewYear, calViewMonth, 1);
    var startWeekday = firstOfMonth.getDay();
    var daysInMonth = new Date(calViewYear, calViewMonth+1, 0).getDate();
    var daysInPrevMonth = new Date(calViewYear, calViewMonth, 0).getDate();
    var todayIso = todayISO();

    var totalCells = Math.ceil((startWeekday+daysInMonth)/7)*7;

    for(var i=0;i<totalCells;i++){
      var cell = document.createElement("div");
      cell.className = "cal-day";
      var dayNum, cellMonth = calViewMonth, cellYear = calViewYear, muted=false;

      if(i < startWeekday){
        dayNum = daysInPrevMonth - startWeekday + i + 1;
        cellMonth = calViewMonth-1; muted = true;
        if(cellMonth<0){ cellMonth=11; cellYear--; }
      } else if(i >= startWeekday+daysInMonth){
        dayNum = i - (startWeekday+daysInMonth) + 1;
        cellMonth = calViewMonth+1; muted = true;
        if(cellMonth>11){ cellMonth=0; cellYear++; }
      } else {
        dayNum = i - startWeekday + 1;
      }

      var iso = cellYear+"-"+pad(cellMonth+1)+"-"+pad(dayNum);
      cell.textContent = dayNum;
      if(muted) cell.classList.add("muted");
      if(iso === todayIso) cell.classList.add("today");
      if(iso === draft.date) cell.classList.add("selected");

      (function(iso){
        cell.addEventListener("click", function(){
          draft.date = iso;
          draft.session = nextSessionFor(iso, editingId);
          dateText.textContent = formatCN(iso);
          updateSessionUI();
          closeCalendar();
        });
      })(iso);

      grid.appendChild(cell);
    }

  var HAND_ITEM_H = 58; // measured on first render, includes 8px gap
  var handEditIndex = null;  // null = creating a new hand (draft mode only)
  var handEditMode = "draft"; // "draft" = editing draft.hands inside the sheet; "direct" = editing entries[x].hands directly
  var handEditEntryId = null; // used when handEditMode === "direct"
  var dragState = null;

  function escapeHtml(s){
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }
  function handPreviewText(s){
    var oneLine = String(s).replace(/\s+/g, " ").trim();
    return oneLine.length > 46 ? oneLine.slice(0,46) + "…" : oneLine;
  }

  function renderHandsList(){
    handsDragZone.innerHTML = "";
    var n = draft.hands.length;

    draft.hands.forEach(function(text, idx){
      var card = document.createElement("div");
      card.className = "hand-card";
      card.style.top = (idx * HAND_ITEM_H) + "px";
      card.setAttribute("data-idx", idx);
      card.innerHTML =
        '<div class="hand-handle" data-idx="'+idx+'">⠿⠿</div>'+
        '<div class="hand-preview">'+(text ? escapeHtml(handPreviewText(text)) : '<span style="color:var(--ink-faint)">（空）</span>')+'</div>'+
        '<div class="hand-index">'+(idx+1)+'</div>'+
        '<div class="hand-arrow">›</div>';
      card.addEventListener("click", function(ev){
        if(ev.target.closest(".hand-handle")) return;
        openHandEditor(idx);
      });
      handsDragZone.appendChild(card);
    });

    // measure real height from first card once rendered
    requestAnimationFrame(function(){
      var first = handsDragZone.querySelector(".hand-card");
      if(first){
        HAND_ITEM_H = first.offsetHeight + 8;
        Array.prototype.forEach.call(handsDragZone.querySelectorAll(".hand-card"), function(c, slot){
          c.style.top = (slot * HAND_ITEM_H) + "px";
        });
      }
      handsDragZone.style.height = n ? (n * HAND_ITEM_H - 8) + "px" : "0px";
    });

    Array.prototype.forEach.call(handsDragZone.querySelectorAll(".hand-handle"), function(handle){
      handle.addEventListener("pointerdown", onHandleDown);
    });

    handAddBtn.classList.toggle("disabled", n >= 5);
    handsCount.textContent = n + "/5";
  }

  function onHandleDown(e){
    e.preventDefault();
    var handle = e.currentTarget;
    var origIdx = parseInt(handle.getAttribute("data-idx"), 10);
    var cardEls = Array.prototype.slice.call(handsDragZone.querySelectorAll(".hand-card"));
    if(cardEls.length < 2) return; // nothing to reorder

    dragState = {
      startY: e.clientY,
      order: cardEls.map(function(_, i){ return i; }), // identity: fresh render order
      draggedOrigIndex: origIdx,
      cards: cardEls,
      pointerId: e.pointerId,
      handle: handle
    };

    var draggedCard = cardEls[origIdx];
    draggedCard.classList.add("dragging");
    draggedCard.style.transition = "none";
    draggedCard.style.zIndex = "50";

    try{ handle.setPointerCapture(e.pointerId); }catch(err){}
    handle.addEventListener("pointermove", onHandleMove);
    handle.addEventListener("pointerup", onHandleUp);
    handle.addEventListener("pointercancel", onHandleUp);
  }

  function onHandleMove(e){
    if(!dragState) return;
    var deltaY = e.clientY - dragState.startY;
    var draggedCard = dragState.cards[dragState.draggedOrigIndex];
    var originalSlot = dragState.draggedOrigIndex;
    var rawTop = originalSlot * HAND_ITEM_H + deltaY;
    var maxTop = (dragState.order.length - 1) * HAND_ITEM_H;
    rawTop = Math.max(0, Math.min(maxTop, rawTop));
    draggedCard.style.top = rawTop + "px";

    var targetSlot = Math.round(rawTop / HAND_ITEM_H);
    var currentPos = dragState.order.indexOf(dragState.draggedOrigIndex);
    if(targetSlot !== currentPos){
      dragState.order.splice(currentPos, 1);
      dragState.order.splice(targetSlot, 0, dragState.draggedOrigIndex);
      dragState.order.forEach(function(origIdx, slot){
        if(origIdx === dragState.draggedOrigIndex) return;
        var c = dragState.cards[origIdx];
        c.style.transition = "top .18s ease";
        c.style.top = (slot * HAND_ITEM_H) + "px";
      });
    }
  }

  function onHandleUp(e){
    if(!dragState) return;
    var handle = dragState.handle;
    var draggedCard = dragState.cards[dragState.draggedOrigIndex];
    draggedCard.classList.remove("dragging");
    draggedCard.style.zIndex = "";

    handle.removeEventListener("pointermove", onHandleMove);
    handle.removeEventListener("pointerup", onHandleUp);
    handle.removeEventListener("pointercancel", onHandleUp);
    try{ handle.releasePointerCapture(dragState.pointerId); }catch(err){}

    var newHands = dragState.order.map(function(origIdx){ return draft.hands[origIdx]; });
    draft.hands = newHands;
    dragState = null;
    renderHandsList();
  }

  handAddBtn.addEventListener("click", function(){

  function openHandEditor(idx){

  // ---------- Populate form from draft ----------

  // ---------- Save / delete ----------
  document.getElementById("saveBtn").addEventListener("click", function(){
    var amt = parseFloat(draft.amount);
    var amountValid = !isNaN(amt) && amt >= 0 && draft.amount !== "";

    // checks in top-to-bottom form order; stop at the first unfilled field
    var checks = [
      { ok: draft.durationSet, el: document.getElementById("fieldDuration") },
      { ok: !!draft.venue,     el: document.getElementById("fieldVenue") },
      { ok: !!draft.level,     el: document.getElementById("fieldLevel") },
      { ok: amountValid,       el: document.getElementById("fieldAmount") }
    ];
    for(var i=0;i<checks.length;i++){
      if(!checks[i].ok){
        scrollToInvalidField(checks[i].el);
        return;
      }
    }

    var record = {
      id: editingId || (Date.now()+"-"+Math.random().toString(36).slice(2,8)),
      date: draft.date,
      session: draft.session,
      venue: draft.venue,
      level: draft.level,
      scores: draft.scores,
      sign: draft.sign,
      amount: amt,
      duration: draft.duration,
      hands: draft.hands.slice()
    };

    if(editingId){
      var idx = entries.findIndex(function(e){ return e.id===editingId; });
      if(idx>-1) entries[idx] = record;
    } else {
      entries.push(record);
    }
    saveEntries();
    render();
    hideSheet();
  });

    entries = entries.filter(function(e){ return e.id!==editingId; });
    saveEntries();
    render();

  function scrollToInvalidField(el){
    if(!el) return;
    el.scrollIntoView({ behavior:"smooth", block:"center" });
    pulseEl(el);
  }
  function pulseEl(el){
    el.style.transition = "box-shadow .15s ease, border-color .15s ease";
    el.style.boxShadow = "0 0 0 2px var(--loss-bright)";
    el.style.borderRadius = el.style.borderRadius || "16px";

  // ---------- Toast ----------
  var toastEl = document.getElementById("toast");
  var toastTimer = null;

    toastEl.textContent = msg;
    toastEl.classList.add("show");

  // ---------- Export / Import ----------
  var exportBtn = document.getElementById("exportBtn");
  var importBtn = document.getElementById("importBtn");
  var importFileInput = document.getElementById("importFileInput");

  exportBtn.addEventListener("click", function(){
    if(!entries.length){ showToast("还没有可导出的记录"); return; }
    var data = JSON.stringify(entries, null, 2);
    var blob = new Blob([data], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "poker-log-" + todayISO() + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
    showToast("已导出 " + entries.length + " 条记录");
  });

  importBtn.addEventListener("click", function(){
    importFileInput.click();
  });

  importFileInput.addEventListener("change", function(){
    var file = importFileInput.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(){
      try{
        var parsed = JSON.parse(reader.result);
        if(!Array.isArray(parsed)) throw new Error("not an array");
        var result = mergeImportedEntries(parsed);
        if(result.added === 0 && result.skipped > 0){
          showToast("没有新记录，已跳过 " + result.skipped + " 条重复");
        } else {
          showToast("已导入 " + result.added + " 条" + (result.skipped ? " · 跳过 " + result.skipped + " 条重复" : ""));
        }
      }catch(err){
        showToast("导入失败，文件格式不正确");
      }
      importFileInput.value = "";
    };
    reader.readAsText(file);
  });

  function entriesContentEqual(a, b){
    return a.date===b.date && a.session===b.session && a.venue===b.venue &&
           a.level===b.level && a.sign===b.sign &&
           Math.abs((a.amount||0) - (b.amount||0)) < 0.001;
  }

  function mergeImportedEntries(importedArr){
    var existingIds = {};
    entries.forEach(function(e){ existingIds[e.id] = true; });

    var added = 0, skipped = 0;
    importedArr.forEach(function(imp){
      if(!imp || typeof imp !== "object" || !imp.date || !imp.venue || !imp.level){
        skipped++; return;
      }
      if(imp.id && existingIds[imp.id]){ skipped++; return; }
      var isDup = entries.some(function(e){ return entriesContentEqual(e, imp); });
      if(isDup){ skipped++; return; }

      var clean = {
        id: imp.id || (Date.now()+"-"+Math.random().toString(36).slice(2,8)),
        date: imp.date,
        session: imp.session || 1,
        duration: (typeof imp.duration === "number") ? imp.duration : null,
        venue: imp.venue,
        level: imp.level,
        scores: imp.scores || {},
        sign: imp.sign === "-" ? "-" : "+",
        amount: typeof imp.amount === "number" ? imp.amount : parseFloat(imp.amount) || 0,
        hands: Array.isArray(imp.hands) ? imp.hands.slice(0,5) : []
      };
      entries.push(clean);
      if(clean.id) existingIds[clean.id] = true;
      added++;
    });

    if(added > 0){ saveEntries(); render(); }
    return { added: added, skipped: skipped };
  }

  // ---------- Stat pages (金额 / 分数 / 赢率 / 关键牌局) ----------
  var statPage = document.getElementById("statPage");
  var spBack = document.getElementById("spBack");
  var spTitle = document.getElementById("spTitle");
  var spBody = document.getElementById("spBody");
  var navBtns = document.querySelectorAll(".nav-btn");

  var STAT_TITLES = {
    amount: "金额趋势",
    score: "分数趋势",
    winrate: "赢率趋势",
    hands: "关键牌局"
  };

  // current stat kind and period for the open page
  var currentStatKind = null;
  var currentStatPeriod = "day"; // "year" | "month" | "day"

  navBtns.forEach(function(btn){
    btn.addEventListener("click", function(){
      currentStatPeriod = "day";
      openStatPage(btn.getAttribute("data-stat"));
    });
  });
  spBack.addEventListener("click", closeStatPage);

  function openStatPage(kind){
    currentStatKind = kind;
    spTitle.textContent = STAT_TITLES[kind] || "";
    if(kind === "hands"){
      renderHandsOverview();
    } else {
      renderChartPage(kind, currentStatPeriod);
    }
    statPage.classList.add("open");
  }
  function closeStatPage(){
    statPage.classList.remove("open");
  }

  function fmtSignedMoney(n){
    return (n>=0?"+":"−")+"HK$"+formatMoney(Math.abs(n));
  }
  function fmtDateShort(iso){
    var d = parseISO(iso);
    return (d.getMonth()+1)+"/"+d.getDate();
  }

  // ---- period bucketing helpers ----
  function periodKey(iso, period){
    var d = parseISO(iso);
    if(period === "year")  return d.getFullYear()+"";
    if(period === "month") return d.getFullYear()+"-"+pad(d.getMonth()+1);
    return iso; // day
  }
  function periodLabel(key, period){
    if(period === "year")  return key+"年";
    if(period === "month"){
      var p = key.split("-");
      return p[0]+"/"+(parseInt(p[1],10));
    }
    // day: show M/D
    var d = parseISO(key);
    return (d.getMonth()+1)+"/"+d.getDate();
  }

  // ---- generic multi-series SVG chart ----
  // series: [{label, color, points:[{label, y}]}]
  // Each series is one line. x axis ticks = unified label set across all series.
  // returns SVG string.
  var SERIES_COLORS = ["#E0BC6A","#8B6BB0","#6B9EB0","#B0846B","#6BB07A","#C96A60"];

  function buildMultiSeriesSVG(allLabels, seriesList, opts){
    opts = opts || {};
    var W = 320, H = 180, padTop = 20, padBottom = 20, padLeft = 8, padRight = 8;
    if(!allLabels.length){
      return '<div class="chart-empty"><div class="ce-glyph">♠︎ ♦︎</div>还没有足够的数据</div>';
    }
    var allValues = [];
    seriesList.forEach(function(s){
      s.points.forEach(function(p){ allValues.push(p.y); });
    });
    if(opts.includeZero !== false) allValues.push(0);
    var minY = Math.min.apply(null, allValues);
    var maxY = Math.max.apply(null, allValues);
    if(minY === maxY){ minY -= 1; maxY += 1; }

    var plotW = W - padLeft - padRight;
    var plotH = H - padTop - padBottom;
    var n = allLabels.length;

    function xPos(i){ return n === 1 ? W/2 : padLeft + (i/(n-1)) * plotW; }
    function yPos(v){ return padTop + (1 - (v - minY)/(maxY - minY)) * plotH; }

    var showZeroLine = minY < 0 && maxY > 0;
    var zeroY = yPos(0);
    var defs = '<defs>';

    var seriesSvg = "";
    seriesList.forEach(function(s, si){
      // build index map: label -> y value
      var map = {};
      s.points.forEach(function(p){ map[p.label] = p.y; });

      // only draw where we have data (skip gaps)
      var segs = [];
      var curSeg = [];
      allLabels.forEach(function(lbl, i){
        if(map[lbl] !== undefined){
          curSeg.push({i:i, y:map[lbl]});
        } else {
          if(curSeg.length) segs.push(curSeg);
          curSeg = [];
        }
      });
      if(curSeg.length) segs.push(curSeg);

      var gid = "tg"+si+"_"+Math.random().toString(36).slice(2,6);
      defs += '<linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'+
        '<stop offset="0%" stop-color="'+s.color+'" stop-opacity="'+(si===0?0.28:0.0)+'"/>'+
        '<stop offset="100%" stop-color="'+s.color+'" stop-opacity="0"/>'+
        '</linearGradient>';

      segs.forEach(function(seg){
        var pathD = seg.map(function(pt, k){
          return (k===0?"M":"L")+xPos(pt.i).toFixed(1)+","+yPos(pt.y).toFixed(1);
        }).join(" ");
        if(si===0 && seg.length>1){
          var fx = xPos(seg[0].i).toFixed(1);
          var lx = xPos(seg[seg.length-1].i).toFixed(1);
          var areaD = pathD+" L"+lx+","+zeroY.toFixed(1)+" L"+fx+","+zeroY.toFixed(1)+" Z";
          seriesSvg += '<path d="'+areaD+'" fill="url(#'+gid+')" class="trend-area"/>';
        }
        seriesSvg += '<path d="'+pathD+'" stroke="'+s.color+'" class="trend-line" stroke-opacity="'+(si===0?1:0.8)+'"/>';
        // dot at last point of each segment
        var last = seg[seg.length-1];
        seriesSvg += '<circle cx="'+xPos(last.i).toFixed(1)+'" cy="'+yPos(last.y).toFixed(1)+'" r="3.5" fill="'+s.color+'" class="trend-dot" stroke="'+s.color+'"/>';
      });
    });

    defs += '</defs>';

    // x-axis: show first, middle, last label
    var axisLabels = "";
    if(n >= 2){
      axisLabels = '<text x="'+xPos(0).toFixed(1)+'" y="'+(H-2)+'" class="chart-axis-text" text-anchor="start">'+escapeHtml(periodLabel(allLabels[0], opts.period||"day"))+'</text>';
      if(n > 2){
        var mid = Math.floor((n-1)/2);
        axisLabels += '<text x="'+xPos(mid).toFixed(1)+'" y="'+(H-2)+'" class="chart-axis-text" text-anchor="middle">'+escapeHtml(periodLabel(allLabels[mid], opts.period||"day"))+'</text>';
      }
      axisLabels += '<text x="'+xPos(n-1).toFixed(1)+'" y="'+(H-2)+'" class="chart-axis-text" text-anchor="end">'+escapeHtml(periodLabel(allLabels[n-1], opts.period||"day"))+'</text>';
    }

    return '<svg viewBox="0 0 '+W+' '+H+'" class="trend-svg" preserveAspectRatio="none">'+
      defs+
      (showZeroLine ? '<line x1="'+padLeft+'" y1="'+zeroY.toFixed(1)+'" x2="'+(W-padRight)+'" y2="'+zeroY.toFixed(1)+'" class="zero-line"/>' : '')+
      seriesSvg+
      axisLabels+
      '</svg>';
  }

  // ---- aggregate entries by period ----
  // returns { labels:[], buckets:{ label: [entry,...] } }
  function bucketByPeriod(chrono, period){
    var labels = [];
    var seen = {};
    var buckets = {};
    chrono.forEach(function(e){
      var k = periodKey(e.date, period);
      if(!seen[k]){ seen[k]=true; labels.push(k); buckets[k]=[]; }
      buckets[k].push(e);
    });
    return { labels:labels, buckets:buckets };
  }

  // ---- build period-aggregated amount series (cumulative running total) ----
  function buildAmountSeries(chrono, period){
    var agg = bucketByPeriod(chrono, period);
    var running = 0;
    var pts = agg.labels.map(function(k){
      agg.buckets[k].forEach(function(e){
        running += (e.sign==="-"?-1:1)*e.amount;
      });
      return { label:k, y: running };
    });
    return [{ label:"累计盈亏（港币）", color: SERIES_COLORS[0], points: pts }];
  }

  // ---- build period-aggregated score series (5 dims + total) ----
  function buildScoreSeries(chrono, period){
    var agg = bucketByPeriod(chrono, period);
    // for each bucket: average of the scores across all entries in that bucket
    var seriesData = {}; // key -> {sum, count}
    var totalData  = {}; // key -> {sum, count}
    CRITERIA.forEach(function(c){ seriesData[c.key]={}; });

    agg.labels.forEach(function(k){
      CRITERIA.forEach(function(c){ seriesData[c.key][k]={sum:0,count:0}; });
      totalData[k]={sum:0,count:0};
      agg.buckets[k].forEach(function(e){
        CRITERIA.forEach(function(c){
          seriesData[c.key][k].sum += (e.scores[c.key]||0);
          seriesData[c.key][k].count++;
        });
        totalData[k].sum += computeTotal(e.scores);
        totalData[k].count++;
      });
    });

    var result = [];
    CRITERIA.forEach(function(c, ci){
      var pts = agg.labels.map(function(k){
        var d = seriesData[c.key][k];
        return { label:k, y: d.count>0 ? Math.round(d.sum/d.count*10)/10 : 0 };
      });
      result.push({ label:c.name, color:SERIES_COLORS[ci], points:pts });
    });
    // total score series
    var totalPts = agg.labels.map(function(k){
      var d = totalData[k];
      return { label:k, y: d.count>0 ? Math.round(d.sum/d.count*10)/10 : 0 };
    });
    result.push({ label:"总分", color:"#E8E4D8", points:totalPts });
    return result;
  }

  // ---- build period-aggregated winrate series (5 score dims) ----
  // Win rate formula: for each bucket, compute cumulative winrate up to & including that bucket
  function buildWinrateSeries(chrono, period){
    var agg = bucketByPeriod(chrono, period);
    // cumulative totals
    var cum = { amt5050:0, dur5050:0, amt100200:0, dur100200:0 };
    // per-criterion cumulative sums (just average per period, not cumulative for scores)
    var criterionCum = {}; // c.key -> {sum, count}
    CRITERIA.forEach(function(c){ criterionCum[c.key]={sum:0,count:0}; });

    var winratePts = [];
    agg.labels.forEach(function(k){
      agg.buckets[k].forEach(function(e){
        if(typeof e.duration === "number"){
          var amt = (e.sign==="-"?-1:1)*e.amount;
          if(e.level==="50/100"){ cum.amt5050+=amt; cum.dur5050+=e.duration; }
          else if(e.level==="100/200"){ cum.amt100200+=amt; cum.dur100200+=e.duration; }
        }
        CRITERIA.forEach(function(c){
          criterionCum[c.key].sum += (e.scores[c.key]||0);
          criterionCum[c.key].count++;
        });
      });
      var wr = (cum.dur5050>0 ? cum.amt5050/(cum.dur5050*30) : 0) +
               (cum.dur100200>0 ? cum.amt100200/(cum.dur100200*60) : 0);
      winratePts.push({ label:k, y: Math.round(wr*100)/100 });
    });

    var result = [{ label:"赢率（bb/百手）", color:SERIES_COLORS[0], points:winratePts }];

    // also append 5 score dim series
    CRITERIA.forEach(function(c, ci){
      var cumS=0, cumC=0;
      var pts = agg.labels.map(function(k){
        agg.buckets[k].forEach(function(e){ cumS+=(e.scores[c.key]||0); cumC++; });
        return { label:k, y: cumC>0 ? Math.round(cumS/cumC*10)/10 : 0 };
      });
      // reset cumS/cumC inside the loop above is wrong; rebuild correctly
      result.push({ label:c.name, color:SERIES_COLORS[ci+1], points:[] });
    });

    // redo the score series correctly
    result.splice(1);
    CRITERIA.forEach(function(c, ci){
      var cCum=0, cCount=0;
      var pts = agg.labels.map(function(k){
        agg.buckets[k].forEach(function(e){ cCum+=(e.scores[c.key]||0); cCount++; });
        return { label:k, y: cCount>0 ? Math.round(cCum/cCount*10)/10 : 0 };
      });
      result.push({ label:c.name, color:SERIES_COLORS[ci+1], points:pts });
    });

    return result;
  }

  // ---- period toggle + chart rendering ----
  function renderChartPage(kind, period){
    var chrono = getChronologicalEntries();

    // build period toggle HTML
    var toggleHtml = '<div class="period-toggle">'+
      ['year','month','day'].map(function(p){
        return '<button class="period-btn'+(p===period?' active':'')+'" data-period="'+p+'">'+
          {year:"年",month:"月",day:"日"}[p]+'</button>';
      }).join('')+
      '</div>';

    spBody.innerHTML = toggleHtml + '<div id="spChartContent"></div>';

    // wire up period buttons
    Array.prototype.forEach.call(spBody.querySelectorAll(".period-btn"), function(btn){
      btn.addEventListener("click", function(){
        currentStatPeriod = btn.getAttribute("data-period");
        renderChartPage(kind, currentStatPeriod);
      });
    });

    var contentEl = document.getElementById("spChartContent");

    if(!chrono.length){
      contentEl.innerHTML = '<div class="chart-empty"><div class="ce-glyph">♠︎ ♦︎</div>还没有记录</div>';
      return;
    }

    var agg = bucketByPeriod(chrono, period);
    var allLabels = agg.labels;

    if(kind === "amount"){
      var series = buildAmountSeries(chrono, period);
      var lastVal = series[0].points.length ? series[0].points[series[0].points.length-1].y : 0;

      contentEl.innerHTML =
        '<div class="sp-current">'+
          '<div class="sp-current-label">当前累计</div>'+
          '<div class="sp-current-val'+(lastVal<0?' neg':'')+'">'+fmtSignedMoney(lastVal)+'</div>'+
        '</div>'+
        '<div class="chart-wrap" id="chartWrap1"></div>'+
        '<div class="sp-chart-meta">纵坐标为港币（HKD）</div>';

      document.getElementById("chartWrap1").innerHTML =
        buildMultiSeriesSVG(allLabels, series, {period:period, includeZero:true});

    } else if(kind === "score"){
      var allSeriesScore = buildScoreSeries(chrono, period);
      // separate total from dim series
      var dimSeries = allSeriesScore.slice(0, CRITERIA.length);
      var totalSeries = [allSeriesScore[CRITERIA.length]];

      var lastTotal = totalSeries[0].points.length ? totalSeries[0].points[totalSeries[0].points.length-1].y : 0;

      var legendHtml = '<div class="series-legend">'+
        dimSeries.map(function(s){ return '<span class="legend-item"><span class="legend-dot" style="background:'+s.color+'"></span>'+s.label+'</span>'; }).join('')+
        '</div>';

      contentEl.innerHTML =
        '<div class="sp-current">'+
          '<div class="sp-current-label">当前平均总分</div>'+
          '<div class="sp-current-val">'+lastTotal.toFixed(1)+' / 10</div>'+
        '</div>'+
        '<div class="sp-section-title">五维分项趋势</div>'+
        '<div class="chart-wrap" id="chartWrap1"></div>'+
        legendHtml+
        '<div class="sp-section-title">总分趋势</div>'+
        '<div class="chart-wrap" id="chartWrap2"></div>';

      document.getElementById("chartWrap1").innerHTML =
        buildMultiSeriesSVG(allLabels, dimSeries, {period:period, includeZero:false});
      document.getElementById("chartWrap2").innerHTML =
        buildMultiSeriesSVG(allLabels, totalSeries, {period:period, includeZero:false});

    } else if(kind === "winrate"){
      var allSeriesWr = buildWinrateSeries(chrono, period);
      var wrSeries = [allSeriesWr[0]];
      var scoreSeries = allSeriesWr.slice(1);

      var lastWr = wrSeries[0].points.length ? wrSeries[0].points[wrSeries[0].points.length-1].y : null;
      var wrValStr = lastWr === null ? "—" : (lastWr>=0?"+":"−")+Math.abs(lastWr).toFixed(2)+" bb/百手";
      var wrValClass = "sp-current-val"+(lastWr!==null && lastWr<0?" neg":"");

      var scoreLegendHtml = '<div class="series-legend">'+
        scoreSeries.map(function(s){ return '<span class="legend-item"><span class="legend-dot" style="background:'+s.color+'"></span>'+s.label+'</span>'; }).join('')+
        '</div>';

      contentEl.innerHTML =
        '<div class="sp-current">'+
          '<div class="sp-current-label">当前赢率</div>'+
          '<div class="'+wrValClass+'">'+wrValStr+'</div>'+
        '</div>'+
        '<div class="sp-section-title">赢率趋势（bb/百手）</div>'+
        '<div class="chart-wrap" id="chartWrap1"></div>'+
        '<div class="sp-section-title">五维分项趋势</div>'+
        '<div class="chart-wrap" id="chartWrap2"></div>'+
        scoreLegendHtml;

      document.getElementById("chartWrap1").innerHTML =
        buildMultiSeriesSVG(allLabels, wrSeries, {period:period, includeZero:true});
      document.getElementById("chartWrap2").innerHTML =
        buildMultiSeriesSVG(allLabels, scoreSeries, {period:period, includeZero:false});
    }
  }

  // ---- 关键牌局总览：flatten all hands across all entries, newest first ----
  function renderHandsOverview(){
    var chrono = getChronologicalEntries();
    var flat = [];
    chrono.forEach(function(e){
      (e.hands || []).forEach(function(text, idx){
        flat.push({ entryId: e.id, handIdx: idx, text: text, date: e.date, session: e.session, venue: e.venue, level: e.level });
      });
    });
    // newest first
    flat.reverse();

    if(!flat.length){
      spBody.innerHTML = '<div class="hands-overview-empty"><div class="ce-glyph">♣︎ ♥︎</div>还没有记录任何关键牌局<br>在记录里的"关键牌局"栏可以添加。</div>';
      return;
    }

    spBody.innerHTML = "";
    flat.forEach(function(item){
      var card = document.createElement("div");
      card.className = "hov-card venue-" + item.venue;
      card.innerHTML =
        '<div class="hov-meta">'+
          '<span class="hov-date">'+formatCN(item.date)+'</span>'+
          '<span class="hov-tag">'+VENUE_LABEL[item.venue]+'</span>'+
          '<span class="hov-tag">'+item.level+'</span>'+
        '</div>'+
        '<div class="hov-text">'+escapeHtml(item.text)+'</div>';
      card.addEventListener("click", function(){
        openHandEditorDirect(item.entryId, item.handIdx);
      });
      spBody.appendChild(card);
    });
  }

  // ---------- Init ----------
  render();

  // scroll list to bottom (latest entries) on load
  window.addEventListener("load", function(){
    window.scrollTo(0, document.body.scrollHeight);
  });
})();
</script>
